<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#2563eb">
  <link rel="stylesheet" href="assets/css/shared.css">
  <title>Government Job Details</title>
  <meta name="description" content="View complete government job details, important dates, and official application links on BooterSpace.">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-slate-100 text-slate-900 min-h-screen page-govt-job-details">
  <div id="navbar"></div>
  <script>
    fetch("navbar.html").then(r => r.text()).then(html => {
      document.getElementById("navbar").innerHTML = html;
      const s = document.createElement("script");
      s.type = "module";
      s.src = "public/js/navbar.js";
      document.body.appendChild(s);
    });
  </script>

  <main class="max-w-5xl mx-auto px-4 py-8">
    <section class="bg-white border border-slate-200 rounded-2xl shadow-sm overflow-hidden">
      <div class="bg-gradient-to-r from-indigo-600 to-blue-600 px-6 py-6">
        <p class="text-xs font-bold tracking-widest uppercase text-indigo-100">Government Vacancy</p>
        <h1 id="jobDetailsTitle" class="text-2xl md:text-3xl font-black text-white mt-1">Government Job Details</h1>
      </div>

      <div class="p-6 space-y-6">
        <div id="jobDetailsMessage" class="hidden rounded-lg border border-amber-200 bg-amber-50 px-4 py-3 text-sm text-amber-800"></div>

        <div class="grid sm:grid-cols-2 lg:grid-cols-3 gap-4" id="quickHighlights"></div>

        <div class="border border-slate-200 rounded-xl overflow-hidden">
          <div class="px-4 py-3 bg-slate-50 border-b border-slate-200">
            <h2 class="text-sm font-black uppercase tracking-wide text-slate-700">Complete Details</h2>
          </div>
          <div id="jobDetailsBody" class="divide-y divide-slate-200"></div>
        </div>
      </div>
    </section>
  </main>

  <script>
    const titleElement = document.getElementById("jobDetailsTitle");
    const bodyElement = document.getElementById("jobDetailsBody");
    const highlightsElement = document.getElementById("quickHighlights");
    const messageElement = document.getElementById("jobDetailsMessage");


    function escapeHtml(value) {
      return String(value ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/\"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function humanizeKey(key) {
      return key
        .replace(/([a-z])([A-Z])/g, "$1 $2")
        .replace(/[_-]+/g, " ")
        .replace(/\s+/g, " ")
        .trim()
        .replace(/\b\w/g, c => c.toUpperCase());
    }

    function formatDate(value) {
      if (!value) return "N/A";
      if (/^\d{4}-\d{2}-\d{2}$/.test(value)) {
        const d = new Date(`${value}T00:00:00`);
        return d.toLocaleDateString();
      }
      return value;
    }

    function formatValue(value, key) {
      if (value === null || value === undefined || value === "") return "N/A";
      if (typeof value === "string" && /(date|deadline)/i.test(key)) return formatDate(value);
      if (Array.isArray(value)) return value.length ? value.join(", ") : "N/A";
      if (typeof value === "object") return JSON.stringify(value, null, 2);
      return String(value);
    }

    function setMessage(text) {
      messageElement.textContent = text;
      messageElement.classList.remove("hidden");
    }

    function formatStateValue(value) {
      const text = escapeHtml(formatValue(value, "state"));
      return `${text} <svg aria-hidden="true" class="inline-block w-4 h-4 text-indigo-500 ml-1" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M10 1.75a6.75 6.75 0 0 0-6.75 6.75c0 4.42 4.62 8.94 6.03 10.21a1.1 1.1 0 0 0 1.44 0c1.41-1.27 6.03-5.79 6.03-10.21A6.75 6.75 0 0 0 10 1.75ZM8.5 8.5a1.5 1.5 0 1 1 3 0 1.5 1.5 0 0 1-3 0Z" clip-rule="evenodd"/></svg>`;
    }

    function renderValue(value, key) {
      const displayValue = formatValue(value, key);
      if (/^(https?:\/\/)/i.test(displayValue)) {
        return `<a href="${escapeHtml(displayValue)}" target="_blank" rel="noopener noreferrer" class="text-indigo-600 font-semibold hover:underline break-all">${escapeHtml(displayValue)}</a>`;
      }
      if (key.toLowerCase() === "state") {
        return `<span class="whitespace-pre-line break-words">${formatStateValue(value)}</span>`;
      }
      return `<span class="whitespace-pre-line break-words">${escapeHtml(displayValue)}</span>`;
    }

    function renderHighlights(job) {
      const selectedHighlights = [
        ["postName", job.postName || job.jobTitle],
        ["publishDate", job.publishDate],
        ["lastDateApply", job.lastDateApply],
        ["state", job.state],
        ["applicationFee", job.applicationFee]
      ];

      const cards = selectedHighlights
        .filter(([, value]) => value !== undefined && value !== null && value !== "")
        .map(([key, value]) => {
          const heading = key === "postName" ? "Post Name" : humanizeKey(key);
          return `
            <article class="bg-slate-50 border border-slate-200 rounded-xl p-4">
              <p class="text-[11px] font-black uppercase tracking-wide text-slate-400">${escapeHtml(heading)}</p>
              <p class="text-sm font-semibold text-slate-700 mt-1 break-words">${key.toLowerCase() === "state" ? formatStateValue(value) : escapeHtml(formatValue(value, key))}</p>
            </article>
          `;
        })
        .join("");

      highlightsElement.innerHTML = cards || '<p class="text-sm text-slate-500">No quick highlights available.</p>';
    }

    function renderJobDetails(job) {
      const postTitle = job.postName || job.jobTitle || "Government Job Details";
      titleElement.textContent = postTitle;
      renderHighlights(job);

      const hiddenKeys = ["id", "createdat", "updatedat", "createdby", "created_by"];
      const rows = Object.entries(job)
        .filter(([key]) => !hiddenKeys.includes(String(key).toLowerCase()))
        .map(([key, value]) => {
          if ((key === "organizationName" || key === "organisationName") && (job.postName || job.jobTitle)) {
            return "";
          }

          const fieldLabel = key === "organizationName" || key === "organisationName"
            ? "Post Name"
            : humanizeKey(key);

          const fieldValue = (key === "organizationName" || key === "organisationName")
            ? (job.postName || job.jobTitle || value)
            : value;

          return `
            <div class="grid md:grid-cols-2 gap-3 p-4 items-start">
              <div class="text-sm text-slate-700 break-words">${renderValue(fieldValue, key)}</div>
              <p class="text-[11px] font-black uppercase tracking-wide text-slate-400 md:text-right">${escapeHtml(fieldLabel)}</p>
            </div>
          `;
        })
        .join("");

      bodyElement.innerHTML = rows || '<div class="p-4 text-slate-500 text-sm">No additional details available for this job.</div>';
    }

    try {
      const params = new URLSearchParams(window.location.search);
      const requestedId = params.get("id") || "";
      const savedJobRaw = sessionStorage.getItem("selectedGovtJob");

      if (!savedJobRaw) {
        setMessage("Job details are unavailable. Please go back and click See Details again.");
      } else {
        const savedJob = JSON.parse(savedJobRaw);
        const savedJobId = String(savedJob.id || "");

        if (requestedId && savedJobId && requestedId !== savedJobId) {
          setMessage("Loaded details may not match the selected job. Please return and open details again.");
        }

        renderJobDetails(savedJob);
      }
    } catch (error) {
      setMessage(`Failed to load job details: ${error.message}`);
    }
  </script>
</body>
</html>
