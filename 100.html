<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Private Company Job Extractor</title>
<style>
body{font-family:Arial,sans-serif;background:#f5f5f5;padding:24px}
.card{max-width:1100px;margin:auto;background:#fff;padding:20px;border-radius:12px}
input,textarea{width:100%;padding:10px;margin:6px 0;border:1px solid #ccc;border-radius:8px}
button{padding:10px 16px;border:0;border-radius:8px;background:#1a5cff;color:#fff;cursor:pointer}
table{width:100%;border-collapse:collapse;margin-top:20px}
td{padding:10px;border-bottom:1px solid #eee;vertical-align:top}
.k{width:280px;font-weight:bold}
</style>
</head>
<body>
<div class="card">
<h2>Private Company Job Extractor</h2>
<p>Paste a company career page (Greenhouse/Lever/Company Careers)</p>

<div style="display:flex;gap:10px">
<input id="urlInput" placeholder="https://job-boards.greenhouse.io/...">
<button onclick="runExtract()">Extract</button>
</div>

<div id="results" style="display:none">
<h3>Editable Fields</h3>
<table id="jobTable"></table>
<button onclick="saveToFirebase()">Save To Firebase (jobs)</button>
</div>
</div>

<script type="module">
import { initializeApp, getApps } from 'https://www.gstatic.com/firebasejs/10.13.2/firebase-app.js';
import { getFirestore, collection, addDoc, serverTimestamp } from 'https://www.gstatic.com/firebasejs/10.13.2/firebase-firestore.js';

const firebaseConfig={
 apiKey:"AIzaSyBeGZBE1u1-y1hDWbRouchgwkgp89D973I",
 authDomain:"kar-kardan.firebaseapp.com",
 projectId:"kar-kardan",
 storageBucket:"kar-kardan.firebasestorage.app",
 messagingSenderId:"554147696994",
 appId:"1:554147696994:web:221dcb883e3b65dcea5c3b"
};

const app=getApps().length?getApps()[0]:initializeApp(firebaseConfig);
const db=getFirestore(app);

const PROXIES=[
u=>'https://corsproxy.io/?'+encodeURIComponent(u),
u=>'https://api.allorigins.win/raw?url='+encodeURIComponent(u)
];

function norm(s){return (s||'').replace(/\s+/g,' ').trim()}
function extractText(doc){
 const c=doc.cloneNode(true);
 c.querySelectorAll('script,style,noscript').forEach(e=>e.remove());
 return norm(c.body?.innerText||'');
}
function pick(txt,patterns=[]){
 for(const p of patterns){
  const m=txt.match(p);
  if(m&&(m[1]||m[2])) return norm(m[1]||m[2]);
 }
 return null;
}
async function fetchHtml(url){
 for(const p of PROXIES){
  try{
   const r=await fetch(p(url));
   if(r.ok) return await r.text();
  }catch(e){}
 }
 return null;
}

window.jobData=null;

window.runExtract=async function(){
 const url=document.getElementById('urlInput').value.trim();
 if(!url) return alert('Enter URL');

 const html=await fetchHtml(url);
 if(!html) return alert('Could not fetch page');

 const doc=new DOMParser().parseFromString(html,'text/html');
 const txt=extractText(doc);

 const D={};
 D.job_title=norm(doc.querySelector('h1')?.textContent)||norm(doc.title);
 D.company_name=pick(txt,[/company[:\s]+([^\n\r]{2,100})/i])||new URL(url).hostname.split('.')[0];
 D.job_location=norm(doc.querySelector('[class*="location"]')?.textContent)||pick(txt,[/location[:\s]+([^\n\r]{2,80})/i]);
 D.employment_type=pick(txt, [/(full[\s-]?time)/i,/(part[\s-]?time)/i,/(internship)/i,/(contract)/i,/(remote)/i,/(hybrid)/i]);
 D.job_description=pick(txt,[/job description[:\s]+([\s\S]{20,800})/i])||txt.slice(0,1000);
 D.key_responsibilities=pick(txt,[/responsibilities[:\s]+([\s\S]{20,500})/i]);
 D.required_skills=pick(txt,[/skills[:\s]+([^\n\r]{5,300})/i,/requirements[:\s]+([^\n\r]{5,300})/i]);
 D.qualifications=pick(txt,[/qualification[s]?[:\s]+([^\n\r]{5,200})/i,/education[:\s]+([^\n\r]{5,200})/i]);
 D.experience_required=pick(txt,[/(\d+\+?\s+years?\s+(?:of\s+)?experience)/i,/(fresher)/i]);
 D.salary_range=pick(txt,[/(₹[\d,\s\-]+LPA)/i,/salary[:\s]+([^\n\r]{5,60})/i]);
 D.benefits_perks=pick(txt,[/benefits[:\s]+([^\n\r]{10,300})/i]);
 D.application_method='Company Career Page';
 D.application_deadline=pick(txt,[/apply before[:\s]+([^\n\r]{5,50})/i,/last date[:\s]+([^\n\r]{5,50})/i]);
 D.company_information=pick(txt,[/about us[:\s]+([\s\S]{20,500})/i]);
 D.required_documents=pick(txt,[/(resume|cv|cover letter|certificate)/i]);
 D.work_schedule=pick(txt,[/(day shift)/i,/(night shift)/i,/(flexible hours)/i]);
 D.travel_relocation=pick(txt,[/(relocation required)/i,/(travel required)/i]);
 D.skills_tags=D.required_skills;
 D.posted_date=pick(txt,[/posted\s+(\d+\s+days?\s+ago)/i]);
 D.recruiter_details=pick(txt,[/recruiter[:\s]+([^\n\r]{3,80})/i,/hiring manager[:\s]+([^\n\r]{3,80})/i]);
 D.apply_link=url;
 D.source_url=url;
 D.platform=url.includes('greenhouse')?'Greenhouse':url.includes('lever')?'Lever':'Company Career Page';

 jobData=D;

 const fields=Object.keys(D);
 document.getElementById('jobTable').innerHTML=fields.map(k=>`
<tr><td class="k">${k.replaceAll('_',' ')}</td>
<td><textarea data-field="${k}">${D[k]??''}</textarea></td></tr>`).join('');

 document.getElementById('results').style.display='block';
}

function getEditedData(){
 const out={};
 document.querySelectorAll('[data-field]').forEach(el=>{
   out[el.dataset.field]=el.value.trim()||null;
 });
 return out;
}

window.saveToFirebase=async function(){
 if(!jobData) return alert('Extract a job first');
 const data=getEditedData();
 await addDoc(collection(db,'jobs'),{
   ...data,
   publishDate:new Date().toISOString().slice(0,10),
   createdAt:serverTimestamp(),
   savedAt:serverTimestamp()
 });
 alert('Saved in Firestore collection: jobs');
}
</script>
</body>
</html>
