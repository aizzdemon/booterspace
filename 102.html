<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Post a Job - KARDAN</title>
  <meta name="description" content="Publish job openings from your organization and reach qualified candidates.">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'Inter', sans-serif;
      background-color: #f3f4f6;
    }
    .nav-button {
      display: inline-block;
      padding: 0.5rem 1rem;
      color: #4b5563;
      font-weight: 500;
      border-radius: 0.375rem;
      transition: all 0.2s;
    }
    .nav-button:hover {
      background-color: #e5e7eb;
      color: #1f2937;
    }
    .logo-box {
      font-size: 1.5rem;
      font-weight: 800;
      letter-spacing: 0.05em;
      color: #2563eb;
      text-align: center;
      margin-top: 1.5rem;
    }
    .spinner {
      width: 14px;
      height: 14px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: currentColor;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      display: inline-block;
      vertical-align: middle;
    }
    .spinner-dark {
      border: 2px solid rgba(0,0,0,0.1);
      border-top-color: #374151;
    }
    @keyframes spin {
      to { transform: rotate(360deg) }
    }
  </style>
</head>
<body class="min-h-screen pb-12">

  <header>
    <div class="logo-box">KARDAN</div>
    <h1 class="text-2xl font-bold text-center mt-4 text-gray-800">Post a Job</h1>
    <nav class="mt-4 text-center space-x-2">
      <a href="#" class="nav-button"><i class="fas fa-home"></i> Home</a>
      <a href="#" class="nav-button"><i class="fas fa-briefcase"></i> Jobs</a>
      <a href="#" class="nav-button"><i class="fas fa-building"></i> Companies</a>
      <a href="#" class="nav-button"><i class="fas fa-user"></i> Profile</a>
    </nav>
  </header>

  <main class="max-w-4xl mx-auto mt-8 px-4">
    
    <!-- Extractor Section -->
    <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-200 mb-6">
      <h2 class="text-lg font-semibold text-gray-800 mb-1"><i class="fas fa-magic text-blue-500 mr-2"></i>Auto-Fill Job Details</h2>
      <p class="text-sm text-gray-500 mb-4">Paste a Greenhouse, Lever, or company career page URL to extract job details instantly.</p>
      
      <div class="flex flex-col sm:flex-row gap-3">
        <input type="text" id="urlInput" placeholder="https://boards.greenhouse.io/..." class="flex-1 px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 text-sm">
        <button id="extractBtn" class="bg-gray-800 text-white font-medium py-2 px-6 rounded-lg hover:bg-gray-900 transition flex items-center justify-center gap-2 whitespace-nowrap">
          <i class="fas fa-search"></i> Extract
        </button>
      </div>
      
      <div id="statusBox" class="hidden mt-4 p-3 rounded-lg text-sm font-medium"></div>
    </div>

    <!-- Form Section -->
    <div class="bg-white p-6 sm:p-8 rounded-xl shadow-sm border border-gray-200">
      <div class="mb-6 border-b border-gray-100 pb-4">
        <h2 class="text-lg font-semibold text-gray-800">Job Information</h2>
        <p class="text-sm text-gray-500">Review and edit the details before publishing.</p>
      </div>

      <form id="jobForm" class="space-y-5">
        
        <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
          <!-- Basic Info -->
          <div>
            <label class="block text-xs font-semibold text-gray-600 uppercase mb-1">Job Title *</label>
            <input type="text" data-key="job_title" id="jobTitle" required class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
          </div>
          <div>
            <label class="block text-xs font-semibold text-gray-600 uppercase mb-1">Company Name *</label>
            <input type="text" data-key="company_name" id="companyName" required class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
          </div>
          <div>
            <label class="block text-xs font-semibold text-gray-600 uppercase mb-1">Company Website</label>
            <input type="url" data-key="company_website" id="companyWebsite" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
          </div>
          <div>
            <label class="block text-xs font-semibold text-gray-600 uppercase mb-1">Location *</label>
            <input type="text" data-key="job_location" id="jobPlace" required class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
          </div>
          <div>
            <label class="block text-xs font-semibold text-gray-600 uppercase mb-1">Employment Type</label>
            <input type="text" data-key="employment_type" id="employmentType" placeholder="e.g. Full-time, Remote" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
          </div>
          <div>
            <label class="block text-xs font-semibold text-gray-600 uppercase mb-1">Experience Required</label>
            <input type="text" data-key="experience_required" id="experienceRequired" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
          </div>
          <div>
            <label class="block text-xs font-semibold text-gray-600 uppercase mb-1">Salary Range</label>
            <input type="text" data-key="salary_range" id="salary" placeholder="e.g. $80k - $120k" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
          </div>
          <div>
            <label class="block text-xs font-semibold text-gray-600 uppercase mb-1">Application Link *</label>
            <input type="url" data-key="apply_link" id="jobLink" required class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
          </div>
        </div>

        <!-- Detailed Textareas -->
        <div class="space-y-5 pt-4 border-t border-gray-100">
          <div>
            <label class="block text-xs font-semibold text-gray-600 uppercase mb-1">Job Description *</label>
            <textarea data-key="job_description" id="jobDescription" rows="4" required class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"></textarea>
          </div>
          <div>
            <label class="block text-xs font-semibold text-gray-600 uppercase mb-1">Key Responsibilities</label>
            <textarea data-key="key_responsibilities" id="keyResponsibilities" rows="3" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"></textarea>
          </div>
          <div>
            <label class="block text-xs font-semibold text-gray-600 uppercase mb-1">Required Skills & Qualifications</label>
            <textarea data-key="required_skills" id="requiredSkills" rows="3" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"></textarea>
          </div>
          <div>
            <label class="block text-xs font-semibold text-gray-600 uppercase mb-1">Benefits & Perks</label>
            <textarea data-key="benefits_perks" id="benefitsPerks" rows="2" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"></textarea>
          </div>
        </div>

        <!-- Hidden input for platform -->
        <input type="hidden" data-key="platform" id="platform">

        <button type="submit" id="submitBtn" class="w-full bg-green-600 text-white font-bold py-3 px-4 rounded-lg hover:bg-green-700 transition flex justify-center items-center gap-2 mt-6">
          <i class="fas fa-paper-plane"></i> Publish Job
        </button>
      </form>
    </div>
  </main>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
    import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
    import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

    // System Environment Variables handling for immersive environment
    const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';
    const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : {};

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    let currentUser = null;

    // Authentication Setup
    async function initAuth() {
      try {
        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
          await signInWithCustomToken(auth, __initial_auth_token);
        } else {
          await signInAnonymously(auth);
        }
      } catch (err) {
        console.error("Auth Error:", err);
      }
    }
    
    onAuthStateChanged(auth, (user) => {
      currentUser = user;
    });

    initAuth();

    // Utility functions for Extractor UI
    function showStatus(msg, type = 'info') {
      const box = document.getElementById('statusBox');
      box.textContent = msg;
      box.classList.remove('hidden', 'bg-blue-100', 'text-blue-700', 'bg-red-100', 'text-red-700', 'bg-green-100', 'text-green-700');
      
      if (type === 'error') {
        box.classList.add('bg-red-100', 'text-red-700');
      } else if (type === 'success') {
        box.classList.add('bg-green-100', 'text-green-700');
      } else {
        box.classList.add('bg-blue-100', 'text-blue-700');
      }
    }

    function setExtractLoading(isLoading) {
      const btn = document.getElementById('extractBtn');
      if (isLoading) {
        btn.disabled = true;
        btn.innerHTML = '<span class="spinner spinner-dark"></span> Fetching...';
        btn.classList.add('opacity-75', 'cursor-not-allowed');
      } else {
        btn.disabled = false;
        btn.innerHTML = '<i class="fas fa-search"></i> Extract';
        btn.classList.remove('opacity-75', 'cursor-not-allowed');
      }
    }

    // Proxy endpoints for scraping
    const PROXIES = [
      u => 'https://corsproxy.io/?' + encodeURIComponent(u),
      u => 'https://api.allorigins.win/raw?url=' + encodeURIComponent(u)
    ];

    async function fetchHtml(url) {
      for (const proxy of PROXIES) {
        try {
          const controller = new AbortController();
          const timeoutId = setTimeout(() => controller.abort(), 12000);
          const r = await fetch(proxy(url), { signal: controller.signal });
          clearTimeout(timeoutId);
          if (r.ok) {
            const t = await r.text();
            if (t && t.length > 300) return t;
          }
        } catch (e) {
          console.log("Proxy failed, trying next...");
        }
      }
      return null;
    }

    // Text parsing functions
    function norm(s) { return (s || '').replace(/\s+/g, ' ').trim(); }

    function pick(txt, patterns) {
      for (const p of patterns) {
        const m = txt.match(p);
        if (m) {
          const val = norm(m[1] || m[2] || m[0]);
          if (val.length > 1) return val;
        }
      }
      return null;
    }

    function pickBlock(txt, headings, maxLen = 600) {
      for (const h of headings) {
        const re = new RegExp(h + '[:\\s]*([\\s\\S]{20,' + maxLen + '}?)(?=\\n[A-Z][a-zA-Z ]{2,30}[:\\n]|$)', 'i');
        const m = txt.match(re);
        if (m && m[1]) return norm(m[1]);
      }
      return null;
    }

    function getPlatform(url) {
      if (url.includes('greenhouse.io')) return 'Greenhouse';
      if (url.includes('lever.co')) return 'Lever';
      if (url.includes('workday.com')) return 'Workday';
      if (url.includes('linkedin.com')) return 'LinkedIn';
      return 'Company Career Page';
    }

    function extractData(html, url) {
      const doc = new DOMParser().parseFromString(html, 'text/html');
      doc.querySelectorAll('script:not([type="application/ld+json"]),style,noscript,nav,footer,header,aside,[class*="cookie"],[class*="banner"],[id*="cookie"]').forEach(e => e.remove());

      let jsonLd = null;
      doc.querySelectorAll('script[type="application/ld+json"]').forEach(el => {
        try {
          const obj = JSON.parse(el.textContent);
          const jobs = [obj].flat().find(o => o['@type'] === 'JobPosting' || o['@type'] === 'jobPosting');
          if (jobs) jsonLd = jobs;
        } catch (e) {}
      });

      const txt = norm(doc.body?.innerText || '');
      const parsedUrl = new URL(url);
      const D = {};

      D.job_title = norm(jsonLd?.title) || norm(doc.querySelector('h1')?.textContent) || norm(doc.title.split('|')[0].split('-')[0]);
      D.company_name = norm(jsonLd?.hiringOrganization?.name) || pick(txt, [/(?:company|employer|organisation|organization)[:\s]+([^\n\r]{2,80})/i]) || parsedUrl.hostname.replace('www.', '').split('.')[0];
      D.company_website = norm(jsonLd?.hiringOrganization?.sameAs) || parsedUrl.origin;
      D.job_location = norm(jsonLd?.jobLocation?.address?.addressLocality) || pick(txt, [/location[:\s]+([^\n\r]{2,80})/i, /(?:based in|office in)[:\s]+([^\n\r]{2,60})/i]);
      D.employment_type = norm(jsonLd?.employmentType) || pick(txt, [/(full[\s-]?time)/i, /(part[\s-]?time)/i, /(internship)/i, /(contract(?:ual)?)/i, /(remote)/i, /(hybrid)/i]);
      D.experience_required = pick(txt, [/(\d+\s*[-–]\s*\d+\s+years?(?:\s+of\s+experience)?)/i, /(\d+\+?\s+years?(?:\s+of)?\s+(?:relevant\s+)?experience)/i, /(fresher|entry[\s-]?level|no experience)/i]);
      D.salary_range = norm(jsonLd?.baseSalary?.value?.value ? String(jsonLd.baseSalary.value.value) : null) || pick(txt, [/(₹[\d,\s\-–]+(?:LPA|lpa|L|lakhs?))/i, /(?:salary|ctc|compensation)[:\s]+([\d,\s\-–₹$€£]+(?:LPA|lpa|per\s+(?:month|year|annum))?)/i, /(\$[\d,]+\s*[-–]\s*\$[\d,]+)/]);
      
      const descEl = doc.querySelector('#content,#job-description,.job-description,.posting-description,.job-details');
      D.job_description = norm(jsonLd?.description?.slice(0, 800)) || norm(descEl?.innerText?.slice(0, 800)) || pickBlock(txt, ['job description', 'about the role', 'the role', 'role overview']) || txt.slice(0, 800) || null;
      D.key_responsibilities = pickBlock(txt, ['key responsibilities', 'responsibilities', 'what you.ll do', 'what you will do', 'duties'], 500);
      D.required_skills = norm(jsonLd?.skills) || pickBlock(txt, ['required skills', 'skills required', 'technical skills', 'key skills', 'qualifications', 'minimum qualifications'], 400);
      D.benefits_perks = pickBlock(txt, ['benefits', 'perks', 'what we offer', 'employee benefits'], 400);
      
      D.apply_link = url;
      D.platform = getPlatform(url);

      return D;
    }

    // Fill the HTML Form with extracted data
    function fillForm(data) {
      document.querySelectorAll('[data-key]').forEach(el => {
        const key = el.getAttribute('data-key');
        if (data[key]) {
          // If the field is combined (e.g. skills and qualifications mapping to one field)
          if(el.value && el.tagName === 'TEXTAREA' && el.value !== data[key]) {
             el.value += '\n\n' + data[key]; // Append if already has content
          } else {
             el.value = data[key];
          }
        }
      });
      // Flash form elements to show they updated
      document.getElementById('jobForm').scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    // Extraction Event
    document.getElementById('extractBtn').addEventListener('click', async (e) => {
      e.preventDefault();
      const url = document.getElementById('urlInput').value.trim();
      if (!url || !url.startsWith('http')) {
        showStatus('Please enter a valid URL starting with https://', 'error');
        return;
      }

      setExtractLoading(true);
      showStatus('Fetching page... Please wait.');
      
      try {
        const html = await fetchHtml(url);
        if (!html) {
          showStatus('Could not fetch the page. The site may block proxies. Manual entry required.', 'error');
        } else {
          showStatus('Parsing job details...');
          const data = extractData(html, url);
          fillForm(data);
          showStatus('Extraction complete! Review the details below.', 'success');
        }
      } catch (err) {
        showStatus('Error: ' + (err.message || 'Something went wrong.'), 'error');
        console.error(err);
      }
      setExtractLoading(false);
    });

    // Form Submission Event
    document.getElementById('jobForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      if (!currentUser) {
        showStatus("Authentication required. Connecting...", "error");
        return;
      }

      const btn = document.getElementById('submitBtn');
      const ogHtml = btn.innerHTML;
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span> Publishing...';
      btn.classList.add('opacity-75');

      try {
        // Collect form data
        const formData = {};
        document.querySelectorAll('[data-key]').forEach(el => {
            formData[el.getAttribute('data-key')] = el.value.trim() || null;
        });

        // Structure object for Firebase
        const jobDocument = {
          userId: currentUser.uid,
          postedBy: currentUser.email || 'Anonymous Employer',
          status: "pending", 
          timestamp: serverTimestamp(),
          likes: 0,
          dislikes: 0,
          ...formData
        };

        // Strict Platform Path Requirements
        const jobsCollectionRef = collection(db, 'artifacts', appId, 'public', 'data', 'jobs');
        const docRef = await addDoc(jobsCollectionRef, jobDocument);

        // Also add a system notification based on strict path
        const notificationText = `New job posted: ${jobDocument.job_title} at ${jobDocument.company_name}`;
        const notificationsRef = collection(db, 'artifacts', appId, 'public', 'data', 'notifications');
        await addDoc(notificationsRef, {
            fromUid: currentUser.uid,
            type: "job_posted",
            message: notificationText,
            link: `job-detail.html?id=${docRef.id}`,
            read: false,
            createdAt: serverTimestamp()
        });

        showStatus("✅ Job successfully published! (Pending Admin Approval)", "success");
        document.getElementById('jobForm').reset();
        document.getElementById('urlInput').value = '';
        window.scrollTo({ top: 0, behavior: 'smooth' });

      } catch (err) {
        console.error(err);
        showStatus("❌ Failed to post job. Database error.", "error");
      }

      btn.disabled = false;
      btn.innerHTML = ogHtml;
      btn.classList.remove('opacity-75');
    });

  </script>
</body>
</html>
