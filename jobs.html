<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Latest Jobs in India | Remote, Fresher & Internship Openings | BooterSpace</title>
  <meta name="description" content="Browse latest job updates including work from home jobs, remote jobs, fresher jobs, and internship opportunities on BooterSpace.">
  <meta name="keywords" content="BooterSpace jobs, remote jobs, fresher jobs, internships, latest jobs">
  <meta name="robots" content="index, follow">
  <link rel="canonical" href="https://aizzdemon.github.io/booterspace/jobs.html">
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="BooterSpace">
  <meta property="og:title" content="Latest Jobs in India | BooterSpace">
  <meta property="og:description" content="Browse latest job updates including work from home jobs, remote jobs, fresher jobs, and internship opportunities on BooterSpace.">
  <meta property="og:url" content="https://aizzdemon.github.io/booterspace/jobs.html">
  <meta property="og:image" content="https://aizzdemon.github.io/booterspace/assets/images/booterspace.png">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Latest Jobs in India | BooterSpace">
  <meta name="twitter:description" content="Browse latest job updates including work from home jobs, remote jobs, fresher jobs, and internship opportunities on BooterSpace.">
  <meta name="twitter:image" content="https://aizzdemon.github.io/booterspace/assets/images/booterspace.png">
  <link rel="stylesheet" href="assets/css/shared.css">
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 min-h-screen flex flex-col font-sans page-jobs">
  <div id="navbar"></div>
  <script>
    fetch('navbar.html').then((r) => r.text()).then((html) => {
      document.getElementById('navbar').innerHTML = html;
      const s = document.createElement('script');
      s.type = 'module';
      s.src = 'public/js/navbar.js';
      document.body.appendChild(s);
    });
  </script>

  <header class="bg-blue-600 py-10 px-4">
    <div class="max-w-5xl mx-auto text-center">
      <h1 class="text-4xl font-extrabold text-white mb-2">Discover Your Dream Job</h1>
      <p class="text-blue-100 text-lg mb-6">Jobs are fetched and refreshed automatically every day.</p>
      <div class="max-w-2xl mx-auto">
        <input id="searchInput" type="search" placeholder="Search by job title or company" class="w-full p-4 rounded-xl border-0 focus:ring-2 focus:ring-blue-300 outline-none">
      </div>
    </div>
  </header>

  <main class="max-w-5xl mx-auto px-4 py-8 w-full flex-grow">
    <div class="mb-6 flex flex-wrap gap-2">
      <button data-filter="all" class="bg-blue-600 text-white px-4 py-2 rounded-full font-semibold">All Jobs</button>
      <button data-filter="remote" class="bg-white border border-slate-200 px-4 py-2 rounded-full font-semibold">Remote jobs</button>
      <button data-filter="fresher" class="bg-white border border-slate-200 px-4 py-2 rounded-full font-semibold">Fresher jobs</button>
      <button data-filter="internship" class="bg-white border border-slate-200 px-4 py-2 rounded-full font-semibold">Internships</button>
      <button data-filter="latest" class="bg-white border border-slate-200 px-4 py-2 rounded-full font-semibold">Latest jobs</button>
    </div>

    <div class="mb-6 border-b border-slate-200 pb-4">
      <h2 id="jobCount" class="text-slate-900 font-bold text-xl">Latest Opportunities</h2>
      <p id="filterSummary" class="text-slate-500 text-sm mt-1">Showing all verified job postings</p>
    </div>

    <section id="jobsList" class="grid gap-4"></section>
    <div id="jobsSentinel" class="h-8"></div>

    <div id="emptyState" class="hidden text-center py-20">
      <h3 class="text-xl font-bold text-slate-800">No matches found</h3>
      <p class="text-slate-500">Try a different search or another filter.</p>
    </div>
  </main>

  <script src="public/js/jobs.js" defer></script>
</body>
</html>
