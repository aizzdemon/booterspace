<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.5.0/firebase-app.js";
import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/10.5.0/firebase-auth.js";
import { getFirestore, enableIndexedDbPersistence } from "https://www.gstatic.com/firebasejs/10.5.0/firebase-firestore.js";

function getEnvVar(...keys) {
  const runtimeEnv = (typeof window !== "undefined" && window.__ENV__) || (typeof self !== "undefined" && self.__ENV__) || {};
  const processEnv = typeof process !== "undefined" && process.env ? process.env : {};

  for (const key of keys) {
    if (runtimeEnv[key]) return runtimeEnv[key];
    if (processEnv[key]) return processEnv[key];
  }

  return "";
}

const firebaseConfig = {
  apiKey: getEnvVar("VITE_FIREBASE_API_KEY", "NEXT_PUBLIC_FIREBASE_API_KEY", "REACT_APP_FIREBASE_API_KEY"),
  authDomain: getEnvVar("VITE_FIREBASE_AUTH_DOMAIN", "NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN", "REACT_APP_FIREBASE_AUTH_DOMAIN"),
  databaseURL: getEnvVar("VITE_FIREBASE_DATABASE_URL", "NEXT_PUBLIC_FIREBASE_DATABASE_URL", "REACT_APP_FIREBASE_DATABASE_URL"),
  projectId: getEnvVar("VITE_FIREBASE_PROJECT_ID", "NEXT_PUBLIC_FIREBASE_PROJECT_ID", "REACT_APP_FIREBASE_PROJECT_ID"),
  storageBucket: getEnvVar("VITE_FIREBASE_STORAGE_BUCKET", "NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET", "REACT_APP_FIREBASE_STORAGE_BUCKET"),
  messagingSenderId: getEnvVar("VITE_FIREBASE_MESSAGING_SENDER_ID", "NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID", "REACT_APP_FIREBASE_MESSAGING_SENDER_ID"),
  appId: getEnvVar("VITE_FIREBASE_APP_ID", "NEXT_PUBLIC_FIREBASE_APP_ID", "REACT_APP_FIREBASE_APP_ID"),
  measurementId: getEnvVar("VITE_FIREBASE_MEASUREMENT_ID", "NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID", "REACT_APP_FIREBASE_MEASUREMENT_ID")
};

const requiredFirebaseKeys = ["apiKey", "authDomain", "projectId", "appId"];
const hasFirebaseConfig = requiredFirebaseKeys.every((key) => Boolean(firebaseConfig[key]));

if (!hasFirebaseConfig) {
  console.error("Firebase configuration is missing. Jobs cannot be loaded until environment variables are configured.");
  window.firebaseBooterError = "missing-config";
} else {
  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  window.db = db;
  window.auth = auth;

  signInAnonymously(auth).catch(err => console.error("Auth error:", err));

  enableIndexedDbPersistence(db).catch((err) => {
      if (err.code !== 'failed-precondition' && err.code !== 'unimplemented') console.error(err);
  });
}
</script>

<script type="module">
import {
  collection, query, where, orderBy, limit,
  getDocs, startAfter, onSnapshot
} from "https://www.gstatic.com/firebasejs/10.5.0/firebase-firestore.js";

const db = window.db;
const jobsList = document.getElementById("jobsList");
const loadMoreBtn = document.getElementById("loadMoreBtn");
const jobCount = document.getElementById("jobCount");
const emptyState = document.getElementById("emptyState");
const locationSuggestions = document.getElementById("locationSuggestions");
const titleSuggestions = document.getElementById("titleSuggestions");
const filterSummary = document.getElementById("filterSummary");

const searchInput = document.getElementById("searchInput");
const locationInput = document.getElementById("locationInput");
const dateFilter = document.getElementById("dateFilter");
const mainSearchBtn = document.getElementById("mainSearchBtn");
const suggestionContainers = [];

if (!db) {
  jobsList.innerHTML = "";
  jobCount.innerText = "Jobs temporarily unavailable";
  filterSummary.innerText = "Please try again later while we finish loading job listings.";
  emptyState.classList.remove("hidden");
  loadMoreBtn.classList.add("hidden");
}

let lastDoc = null; 
let jobsRealtimeUnsubscribe = null;
const INITIAL_PAGE_SIZE = 10;
const SUBSEQUENT_PAGE_SIZE = 20;
let loadedJobs = []; // Maintain local list for filtering
const uniqueLocations = new Set();
const uniqueTitles = new Set();

const formatSalary = (val) => val ? String(val) : "Salary Undisclosed";

function escapeHtml(value) {
  return String(value ?? "")
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#039;");
}

function escapeAttribute(value) {
  return escapeHtml(value).replace(/`/g, "&#096;");
}

function normalizeImageUrl(rawUrl) {
  if (!rawUrl || typeof rawUrl !== "string") return "";
  const trimmed = rawUrl.trim();
  if (!trimmed) return "";
  if (/^https?:\/\//i.test(trimmed)) return trimmed;
  return "";
}

function normalizeWebsiteUrl(rawUrl) {
  if (!rawUrl || typeof rawUrl !== "string") return "";
  const trimmed = rawUrl.trim();
  if (!trimmed) return "";
  if (/^https?:\/\//i.test(trimmed)) return trimmed;
  return `https://${trimmed}`;
}

function updateSuggestions(job) {
  const location = typeof job.location === "string" ? job.location.trim() : "";
  const title = typeof job.title === "string" ? job.title.trim() : "";

  // Update Location Suggestions
  if (location && !uniqueLocations.has(location)) {
    uniqueLocations.add(location);
    const option = document.createElement("option");
    option.value = location;
    locationSuggestions.appendChild(option);
  }
  // Update Title Suggestions
  if (title && !uniqueTitles.has(title)) {
    uniqueTitles.add(title);
    const option = document.createElement("option");
    option.value = title;
    titleSuggestions.appendChild(option);
  }
}

function closeSuggestionDropdowns() {
  suggestionContainers.forEach((dropdown) => dropdown.classList.add("hidden"));
}

function createSuggestionDropdown(inputEl, optionsSet, onSelect) {
  const parent = inputEl.parentElement;
  const dropdown = document.createElement("div");
  dropdown.className = "hidden absolute z-30 mt-1 w-full rounded-xl border border-slate-200 bg-white shadow-lg max-h-60 overflow-auto";
  parent.appendChild(dropdown);
  suggestionContainers.push(dropdown);

  function renderSuggestions() {
    const queryText = inputEl.value.trim().toLowerCase();
    if (!queryText) {
      dropdown.classList.add("hidden");
      dropdown.innerHTML = "";
      return;
    }

    const matches = [...optionsSet]
      .filter((value) => value.toLowerCase().includes(queryText))
      .sort((a, b) => a.localeCompare(b))
      .slice(0, 8);

    if (!matches.length) {
      dropdown.classList.add("hidden");
      dropdown.innerHTML = "";
      return;
    }

    dropdown.innerHTML = matches.map((match) => (
      `<button type="button" class="w-full text-left px-3 py-2 text-sm text-slate-700 hover:bg-slate-100" data-suggestion="${escapeAttribute(match)}">${escapeHtml(match)}</button>`
    )).join("");
    dropdown.classList.remove("hidden");
  }

  inputEl.addEventListener("focus", renderSuggestions);
  inputEl.addEventListener("input", renderSuggestions);

  dropdown.addEventListener("mousedown", (event) => {
    event.preventDefault();
    const selected = event.target.closest("[data-suggestion]");
    if (!selected) return;
    const value = selected.dataset.suggestion || "";
    inputEl.value = value;
    dropdown.classList.add("hidden");
    onSelect();
  });

  return { renderSuggestions };
}

const titleSuggestionDropdown = createSuggestionDropdown(searchInput, uniqueTitles, applyFilters);
const locationSuggestionDropdown = createSuggestionDropdown(locationInput, uniqueLocations, applyFilters);

function renderJobCard(job) {
  const companyName = job.company || "Unknown Company";
  const title = job.title || "Untitled role";
  const location = job.location || "Remote";
  const logo = normalizeImageUrl(job.logoUrl) || `https://ui-avatars.com/api/?name=${encodeURIComponent(companyName)}&background=random`;
  const websiteUrl = normalizeWebsiteUrl(job.companyWebsite || job.website || "");
  const postedAt = typeof job.timestamp?.toMillis === "function" ? job.timestamp.toMillis() : 0;
  const isNew = postedAt > 0 && (Date.now() - postedAt < 3 * 24 * 60 * 60 * 1000);
  const safeCompanyName = escapeHtml(companyName);
  const safeTitle = escapeHtml(title);
  const safeLocation = escapeHtml(location);
  const safeWebsiteUrl = escapeAttribute(websiteUrl);
  const safeLogo = escapeAttribute(logo);
  const safeJobId = encodeURIComponent(job.id || "");
  const companyMarkup = websiteUrl
    ? `<a href="${safeWebsiteUrl}" target="_blank" rel="noopener noreferrer" class="min-w-0 font-semibold truncate text-slate-600 hover:text-blue-600 transition-colors" title="Visit ${escapeAttribute(companyName)} website">${safeCompanyName}</a>`
    : `<span class="min-w-0 font-semibold truncate text-slate-600">${safeCompanyName}</span>`;
  
  const div = document.createElement("article");
  div.className = "group bg-white p-4 sm:p-5 rounded-2xl border border-slate-100 shadow-sm hover:shadow-xl hover:border-blue-200 transition-all duration-300 flex flex-col sm:flex-row gap-4 sm:gap-5 items-stretch sm:items-center";

  div.innerHTML = `
    <div class="flex min-w-0 items-start gap-3 sm:gap-5 w-full">
      <div class="relative shrink-0">
        <img src="${safeLogo}" alt="${escapeAttribute(companyName)} logo" loading="lazy" class="w-12 h-12 sm:w-16 sm:h-16 rounded-xl object-cover bg-slate-50 border border-slate-100" onerror="this.src='https://ui-avatars.com/api/?name=Company'">
        ${isNew ? '<span class="absolute -top-2 -right-2 flex h-3 w-3" aria-label="New job"><span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-blue-400 opacity-75"></span><span class="relative inline-flex rounded-full h-3 w-3 bg-blue-500"></span></span>' : ''}
      </div>
      <div class="min-w-0 flex-grow">
        <div class="flex flex-wrap items-center gap-2 mb-1">
          <h3 class="min-w-0 font-bold text-base sm:text-lg text-slate-900 group-hover:text-blue-600 transition-colors break-words">${safeTitle}</h3>
        </div>
        <div class="flex flex-col gap-2 text-[15px] text-slate-500 font-medium sm:flex-row sm:flex-wrap sm:gap-x-4 sm:gap-y-1 sm:text-sm">
          <span class="flex min-w-0 items-center">
            ${companyMarkup}
          </span>
          <span class="flex min-w-0 items-center gap-1.5 text-blue-600/80">
            <button type="button" class="copy-emoji inline-flex h-9 w-9 shrink-0 items-center justify-center rounded-xl bg-blue-50 text-base sm:h-auto sm:w-auto sm:bg-transparent" data-copy-emoji="📍" title="Copy location emoji" aria-label="Copy location emoji">📍</button>
            <span class="truncate">${safeLocation}</span>
          </span>
        </div>
        <div class="mt-3 font-bold text-slate-900 text-sm flex items-center gap-1.5">
          <button type="button" class="copy-emoji inline-flex h-9 w-9 shrink-0 items-center justify-center rounded-xl bg-blue-50 text-base sm:h-auto sm:w-auto sm:bg-transparent" data-copy-emoji="💵" title="Copy salary emoji" aria-label="Copy salary emoji">💵</button>
          <span>${escapeHtml(formatSalary(job.salary))}</span>
        </div>
      </div>
    </div>
    <div class="flex w-full shrink-0 sm:w-auto">
      <button type="button" data-job-id="${safeJobId}" class="view-details min-h-11 w-full bg-slate-900 text-white px-6 py-2.5 rounded-xl font-bold text-sm hover:bg-blue-600 transition-colors shadow-lg shadow-slate-200 sm:w-auto">View Details</button>
    </div>
  `;
  return div;
}

const emojiToast = document.getElementById("emojiToast");
let emojiToastTimeout;

function showEmojiToast(message) {
  emojiToast.textContent = message;
  emojiToast.classList.remove("hidden");
  clearTimeout(emojiToastTimeout);
  emojiToastTimeout = setTimeout(() => {
    emojiToast.classList.add("hidden");
  }, 1400);
}

async function copyEmoji(emoji) {
  try {
    await navigator.clipboard.writeText(emoji);
    showEmojiToast(`Copied ${emoji}`);
  } catch (err) {
    console.error("Emoji copy failed:", err);
    showEmojiToast("Unable to copy emoji");
  }
}

// Client-side Filter Logic
function applyFilters() {
  const keyword = searchInput.value.toLowerCase().trim();
  const location = locationInput.value.toLowerCase().trim();
  const dateVal = dateFilter.value;

  const filtered = loadedJobs.filter(job => {
    const titleText = String(job.title || "").toLowerCase();
    const companyText = String(job.company || "").toLowerCase();
    const locationText = String(job.location || "remote").toLowerCase();
    const matchKeyword = !keyword || titleText.includes(keyword) || companyText.includes(keyword);
    const matchLocation = !location || locationText.includes(location);

    let matchDate = true;
    if (dateVal !== "all") {
      const hours = parseInt(dateVal) * 24;
      if (job.timestamp?.toMillis) {
        const diff = (Date.now() - job.timestamp.toMillis()) / (1000 * 60 * 60);
        matchDate = diff <= hours;
      }
    }

    return matchKeyword && matchLocation && matchDate;
  });

  renderList(filtered);
}

function renderList(jobs) {
  jobsList.innerHTML = "";
  const isSearching = searchInput.value || locationInput.value || dateFilter.value !== "all";
  jobCount.innerText = isSearching ? (jobs.length === 1 ? "1 Job" : `${jobs.length} Jobs`) : "Latest Opportunities";
  if (jobs.length === 0) {
    emptyState.classList.remove("hidden");
    loadMoreBtn.classList.add("hidden");
    filterSummary.innerText = isSearching ? "No results match your current filters" : "";
  } else {
    emptyState.classList.add("hidden");
    const fragment = document.createDocumentFragment();
    jobs.forEach(job => fragment.appendChild(renderJobCard(job)));
    jobsList.appendChild(fragment);
    
    if (isSearching) {
       loadMoreBtn.classList.add("hidden");
       filterSummary.innerText = jobs.length === 1 ? "Found 1 job for your search" : `Found ${jobs.length} jobs for your search`;
    } else {
       filterSummary.innerText = "";
    }
  }
}

function handleSnapshotData(snapshot, isLoadMore, currentLimit) {
  if (snapshot.empty && !isLoadMore) {
    emptyState.classList.remove("hidden");
    jobsList.innerHTML = "";
    loadMoreBtn.classList.add("hidden");
    return;
  }

  const newJobs = snapshot.docs.map(d => {
    const data = { id: d.id, ...d.data() };
    updateSuggestions(data);
    return data;
  });

  loadedJobs = isLoadMore ? [...loadedJobs, ...newJobs] : newJobs;
  lastDoc = snapshot.docs[snapshot.docs.length - 1] || null;
  titleSuggestionDropdown.renderSuggestions();
  locationSuggestionDropdown.renderSuggestions();

  applyFilters();

  const isSearching = searchInput.value || locationInput.value || dateFilter.value !== "all";
  if (snapshot.docs.length < currentLimit || isSearching) {
    loadMoreBtn.classList.add("hidden");
  } else {
    loadMoreBtn.classList.remove("hidden");
    loadMoreBtn.innerHTML = '<span>Show More Jobs</span><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>';
    loadMoreBtn.disabled = false;
  }
}

async function fetchJobs(isLoadMore = false) {
  if (!db) return;
  try {
    const currentLimit = isLoadMore ? SUBSEQUENT_PAGE_SIZE : INITIAL_PAGE_SIZE;

    if (!isLoadMore) {
      jobsList.innerHTML = '<div class="skeleton h-32 rounded-2xl"></div>'.repeat(3);
      lastDoc = null;
      loadedJobs = [];
      emptyState.classList.add("hidden");
    } else {
      loadMoreBtn.innerHTML = '<span class="animate-spin rounded-full h-4 w-4 border-2 border-blue-600 border-t-transparent"></span> Loading...';
      loadMoreBtn.disabled = true;
    }

    let q = query(
      collection(db, "jobs"),
      where("status", "==", "approved"),
      orderBy("timestamp", "desc"),
      limit(currentLimit)
    );

    if (isLoadMore && lastDoc) {
      q = query(q, startAfter(lastDoc));
      const snap = await getDocs(q);
      handleSnapshotData(snap, true, currentLimit);
      return;
    }

    if (jobsRealtimeUnsubscribe) {
      jobsRealtimeUnsubscribe();
    }

    jobsRealtimeUnsubscribe = onSnapshot(q, (snapshot) => {
      handleSnapshotData(snapshot, false, currentLimit);
    }, (err) => {
      console.error("Realtime Firestore Error:", err);
      jobCount.innerText = "Error loading jobs";
      filterSummary.innerText = "We could not load jobs right now. Please refresh or try again later.";
      emptyState.classList.remove("hidden");
    });

  } catch (err) {
    console.error("Firestore Error:", err);
    jobCount.innerText = "Error loading jobs";
    filterSummary.innerText = "We could not load jobs right now. Please refresh or try again later.";
    emptyState.classList.remove("hidden");
  }
}

// Events
loadMoreBtn.addEventListener("click", () => fetchJobs(true));
mainSearchBtn.addEventListener("click", applyFilters);
searchInput.addEventListener("input", applyFilters);
locationInput.addEventListener("input", applyFilters);
dateFilter.addEventListener("change", applyFilters);
document.addEventListener("click", (event) => {
  if (event.target.closest("#searchInput, #locationInput, [data-suggestion]")) return;
  closeSuggestionDropdowns();
});
jobsList.addEventListener("click", (event) => {
  const copyButton = event.target.closest("[data-copy-emoji]");
  if (copyButton) {
    copyEmoji(copyButton.dataset.copyEmoji);
    return;
  }

  const detailsButton = event.target.closest("[data-job-id]");
  if (detailsButton) {
    window.location.href = `job-detail.html?id=${detailsButton.dataset.jobId}`;
  }
});

// Initial Load
window.onload = () => {
  fetchJobs();
};

window.addEventListener("beforeunload", () => {
  if (jobsRealtimeUnsubscribe) jobsRealtimeUnsubscribe();
});

</script>

  <script type="module" src="public/js/browser-notifications.js"></script>
</body>
