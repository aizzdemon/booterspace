  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
    import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-auth.js";

    function getEnvVar(...keys) {
  const runtimeEnv = (typeof window !== "undefined" && window.__ENV__) || (typeof self !== "undefined" && self.__ENV__) || {};
  const processEnv = typeof process !== "undefined" && process.env ? process.env : {};

  for (const key of keys) {
    if (runtimeEnv[key]) return runtimeEnv[key];
    if (processEnv[key]) return processEnv[key];
  }

  return "";
}

const firebaseConfig = {
      apiKey: getEnvVar("VITE_FIREBASE_API_KEY", "NEXT_PUBLIC_FIREBASE_API_KEY", "REACT_APP_FIREBASE_API_KEY"),
      authDomain: getEnvVar("VITE_FIREBASE_AUTH_DOMAIN", "NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN", "REACT_APP_FIREBASE_AUTH_DOMAIN"),
      projectId: getEnvVar("VITE_FIREBASE_PROJECT_ID", "NEXT_PUBLIC_FIREBASE_PROJECT_ID", "REACT_APP_FIREBASE_PROJECT_ID"),
      storageBucket: getEnvVar("VITE_FIREBASE_STORAGE_BUCKET", "NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET", "REACT_APP_FIREBASE_STORAGE_BUCKET"),
      messagingSenderId: getEnvVar("VITE_FIREBASE_MESSAGING_SENDER_ID", "NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID", "REACT_APP_FIREBASE_MESSAGING_SENDER_ID"),
      appId: getEnvVar("VITE_FIREBASE_APP_ID", "NEXT_PUBLIC_FIREBASE_APP_ID", "REACT_APP_FIREBASE_APP_ID"),
      measurementId: getEnvVar("VITE_FIREBASE_MEASUREMENT_ID", "NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID", "REACT_APP_FIREBASE_MEASUREMENT_ID")
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);
    const ADMIN_UID = "nkXAUBb7ffZQ5CtyShWl6YcQ39t2";

    onAuthStateChanged(auth, (user) => {
      if (!user) {
        window.location.href = "login.html";
        return;
      }

      const form = document.getElementById("bookForm");
      const notice = document.getElementById("adminOnlyNotice");

      if (user.uid !== ADMIN_UID) {
        if (notice) notice.classList.remove("hidden");
        if (form) {
          form.classList.add("opacity-50", "pointer-events-none");
          form.querySelectorAll("input, textarea, button").forEach((el) => el.disabled = true);
        }
        return;
      }

      if (form) {
        form.addEventListener("submit", async (e) => {
          e.preventDefault();

          const title = form.title.value.trim();
          const description = form.description.value.trim();
          const link = form.link.value.trim();
          const author = form.author.value.trim();
          const price = form.price.value.trim();
          const photo = form.photo.value.trim();

          if (!title || !description || !link || !author || !price) {
            alert("All fields except photo are required.");
            return;
          }

          try {
            await addDoc(collection(db, "books"), {
              title,
              description,
              link,
              author,
              price,
              photo,
              userId: user.uid,
              timestamp: serverTimestamp()
            });

            alert("Book posted successfully!");
            form.reset();
          } catch (error) {
            console.error("Error posting book: ", error);
            alert("Error posting book: " + error.message);
          }
        });
      }
    });
  </script>

  <div class="max-w-2xl mx-auto bg-white p-6 rounded shadow mt-6">
    <h1 class="text-2xl font-bold mb-4">Post a Book</h1>
    <p id="adminOnlyNotice" class="hidden mb-4 text-sm font-semibold text-amber-700 bg-amber-50 border border-amber-200 rounded p-3">Only the platform admin can create books under current Firestore security rules.</p>
    <form id="bookForm" class="space-y-4">
      <input type="text" name="title" placeholder="Book Title" required class="w-full p-2 border rounded" />
      <textarea name="description" placeholder="Short Description" required class="w-full p-2 border rounded"></textarea>
      <input type="text" name="author" placeholder="Author" required class="w-full p-2 border rounded" />
      <input type="text" name="price" placeholder="Price (e.g. 500 or 1500)" required class="w-full p-2 border rounded" />
      <input type="url" name="link" placeholder="Amazon Book Link" required class="w-full p-2 border rounded" />
      <input type="url" name="photo" placeholder="Book Photo Link (Image URL)" class="w-full p-2 border rounded" />
      <button type="submit" class="bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700">Post Book</button>
    </form>
