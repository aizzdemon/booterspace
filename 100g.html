<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Job Extractor</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,sans-serif;background:#f5f5f5;padding:1.5rem}
.wrap{max-width:900px;margin:0 auto}
h1{font-size:20px;font-weight:500;color:#111;margin-bottom:4px}
.sub{font-size:14px;color:#666;margin-bottom:1.5rem}
.api-row{display:flex;gap:8px;margin-bottom:1rem;align-items:center}
.api-row label{font-size:13px;color:#444;white-space:nowrap}
.api-row input{flex:1;padding:9px 12px;border:1px solid #ccc;border-radius:8px;font-size:14px;background:#fff;color:#111}
.api-row input:focus{outline:none;border-color:#888}
.api-hint{font-size:12px;color:#888;margin-bottom:1rem}
.api-hint a{color:#1d4ed8;text-decoration:none}
.row{display:flex;gap:8px;margin-bottom:1rem}
input[type=text]{flex:1;padding:9px 12px;border:1px solid #ccc;border-radius:8px;font-size:14px;background:#fff;color:#111}
input[type=text]:focus{outline:none;border-color:#888}
.btn{padding:9px 18px;border:1px solid #ccc;border-radius:8px;background:#fff;color:#111;font-size:14px;cursor:pointer;white-space:nowrap;display:flex;align-items:center;gap:6px}
.btn:hover{background:#f0f0f0}
.btn:active{transform:scale(0.98)}
.btn:disabled{opacity:0.5;cursor:not-allowed}
.btn-save{border-color:#16a34a;color:#16a34a}
.btn-save:hover{background:#f0fdf4}
.status{font-size:13px;padding:10px 14px;border-radius:8px;margin-bottom:1rem;display:none}
.status.info{background:#eff6ff;color:#1d4ed8;display:block}
.status.error{background:#fef2f2;color:#dc2626;display:block}
.status.success{background:#f0fdf4;color:#16a34a;display:block}
.card{background:#fff;border:1px solid #e5e7eb;border-radius:12px;padding:1.25rem;margin-bottom:1rem;display:none}
.card-title{font-size:14px;font-weight:500;color:#666;margin-bottom:1rem}
.field-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.field{display:flex;flex-direction:column;gap:4px}
.field.full{grid-column:1/-1}
.field label{font-size:12px;color:#666;font-weight:500;text-transform:uppercase;letter-spacing:0.04em}
.field textarea,.field input[type=text]{width:100%;padding:8px 10px;border:1px solid #e5e7eb;border-radius:8px;font-size:13px;background:#f9fafb;color:#111;resize:vertical;min-height:36px;font-family:Arial,sans-serif}
.field textarea{min-height:80px}
.field textarea:focus,.field input[type=text]:focus{outline:none;border-color:#aaa;background:#fff}
.actions{display:flex;gap:8px;justify-content:flex-end;margin-top:1rem}
.spinner{width:14px;height:14px;border:2px solid #ccc;border-top-color:#666;border-radius:50%;animation:spin 0.7s linear infinite;display:inline-block}
@keyframes spin{to{transform:rotate(360deg)}}
.badge{display:inline-block;font-size:11px;padding:2px 8px;border-radius:20px;margin-left:6px;background:#dcfce7;color:#16a34a;vertical-align:middle}
</style>
</head>
<body>
<div class="wrap">
  <h1>Job Extractor <span class="badge">Gemini AI</span></h1>
  <p class="sub">Paste a Greenhouse, Lever, or company career page URL to extract job details</p>

  <div class="api-row">
    <label>Gemini API Key</label>
    <input type="text" id="geminiKey" placeholder="AIza..." />
  </div>
  <p class="api-hint">Free API key from <a href="https://aistudio.google.com/app/apikey" target="_blank">aistudio.google.com</a> — no credit card needed</p>

  <div class="row">
    <input type="text" id="urlInput" placeholder="Paste job URL here" />
    <button class="btn" id="extractBtn" onclick="runExtract()">
      <i class="ti ti-search"></i> Extract
    </button>
  </div>

  <div class="status" id="status"></div>

  <div class="card" id="resultsCard">
    <div class="card-title">Extracted fields — review and edit before saving</div>
    <div class="field-grid" id="fieldGrid"></div>
    <div class="actions">
      <button class="btn btn-save" id="saveBtn" onclick="saveToFirebase()">
        <i class="ti ti-database"></i> Save to Firebase
      </button>
    </div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-firestore-compat.js"></script>
<script>
const firebaseConfig = {
  apiKey: "AIzaSyBeGZBE1u1-y1hDWbRouchgwkgp89D973I",
  authDomain: "kar-kardan.firebaseapp.com",
  projectId: "kar-kardan",
  storageBucket: "kar-kardan.firebasestorage.app",
  messagingSenderId: "554147696994",
  appId: "1:554147696994:web:221dcb883e3b65dcea5c3b"
};
if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

const FIELDS = [
  {key:'job_title',label:'Job title'},
  {key:'company_name',label:'Company name'},
  {key:'company_website',label:'Company website'},
  {key:'job_location',label:'Location'},
  {key:'employment_type',label:'Employment type'},
  {key:'experience_required',label:'Experience required'},
  {key:'salary_range',label:'Salary range'},
  {key:'work_schedule',label:'Work schedule'},
  {key:'application_deadline',label:'Application deadline'},
  {key:'posted_date',label:'Posted date'},
  {key:'job_description',label:'Job description',full:true,area:true},
  {key:'key_responsibilities',label:'Key responsibilities',full:true,area:true},
  {key:'required_skills',label:'Required skills',full:true,area:true},
  {key:'qualifications',label:'Qualifications',full:true,area:true},
  {key:'benefits_perks',label:'Benefits & perks',full:true,area:true},
  {key:'company_information',label:'About the company',full:true,area:true},
  {key:'travel_relocation',label:'Travel / relocation'},
  {key:'recruiter_details',label:'Recruiter details'},
  {key:'apply_link',label:'Apply link',full:true},
];

const PROXIES = [
  u => 'https://corsproxy.io/?'+encodeURIComponent(u),
  u => 'https://api.allorigins.win/raw?url='+encodeURIComponent(u),
  u => 'https://thingproxy.freeboard.io/fetch/'+u,
];

function setStatus(msg, type='info'){
  const el = document.getElementById('status');
  el.textContent = msg;
  el.className = 'status '+type;
}

function setLoading(on){
  const btn = document.getElementById('extractBtn');
  btn.innerHTML = on ? '<span class="spinner"></span> Extracting…' : '<i class="ti ti-search"></i> Extract';
  btn.disabled = on;
}

async function fetchHtml(url){
  for(const proxy of PROXIES){
    try{
      const r = await fetch(proxy(url), {signal: AbortSignal.timeout(12000)});
      if(r.ok){
        const t = await r.text();
        if(t && t.length > 300) return t;
      }
    }catch(e){}
  }
  return null;
}

function norm(s){ return (s||'').replace(/\s+/g,' ').trim(); }

function cleanText(html){
  const doc = new DOMParser().parseFromString(html, 'text/html');
  doc.querySelectorAll('script,style,noscript,nav,footer,header,aside,[class*="cookie"],[class*="banner"]').forEach(e=>e.remove());
  return norm(doc.body?.innerText||'').slice(0, 12000);
}

async function extractWithGemini(text, url, apiKey){
  const prompt = `You are a job posting data extractor. Extract structured information from the job posting text below and return ONLY valid JSON with these exact keys (use null for missing fields, no extra text, no markdown):

{
  "job_title": string,
  "company_name": string,
  "company_website": string,
  "job_location": string,
  "employment_type": string,
  "experience_required": string,
  "salary_range": string,
  "work_schedule": string,
  "application_deadline": string,
  "posted_date": string,
  "job_description": string,
  "key_responsibilities": string,
  "required_skills": string,
  "qualifications": string,
  "benefits_perks": string,
  "company_information": string,
  "travel_relocation": string,
  "recruiter_details": string,
  "apply_link": "${url}"
}

Job posting text:
${text}`;

  const res = await fetch(
    `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`,
    {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({
        contents: [{parts: [{text: prompt}]}],
        generationConfig: {temperature: 0, maxOutputTokens: 2048}
      }),
      signal: AbortSignal.timeout(30000)
    }
  );

  if(!res.ok){
    const err = await res.json().catch(()=>({}));
    throw new Error(err?.error?.message || 'Gemini API error: '+res.status);
  }

  const data = await res.json();
  const raw = data?.candidates?.[0]?.content?.parts?.[0]?.text || '';
  const clean = raw.replace(/```json|```/g,'').trim();
  return JSON.parse(clean);
}

function buildForm(data){
  const grid = document.getElementById('fieldGrid');
  grid.innerHTML = FIELDS.map(f=>{
    const raw = data[f.key] || '';
    const val = raw.toString().replace(/</g,'&lt;').replace(/"/g,'&quot;');
    const cls = f.full ? 'field full' : 'field';
    const input = f.area
      ? `<textarea data-key="${f.key}">${raw}</textarea>`
      : `<input type="text" data-key="${f.key}" value="${val}" />`;
    return `<div class="${cls}"><label>${f.label}</label>${input}</div>`;
  }).join('');
  document.getElementById('resultsCard').style.display = 'block';
}

function getFormData(){
  const out = {};
  document.querySelectorAll('[data-key]').forEach(el=>{ out[el.dataset.key] = el.value.trim()||null; });
  return out;
}

window.runExtract = async function(){
  const url = document.getElementById('urlInput').value.trim();
  const apiKey = document.getElementById('geminiKey').value.trim();

  if(!url || !url.startsWith('http')){ setStatus('Please enter a valid URL starting with https://','error'); return; }
  if(!apiKey){ setStatus('Please enter your Gemini API key.','error'); return; }

  setLoading(true);
  document.getElementById('resultsCard').style.display = 'none';

  try{
    setStatus('Fetching page via proxy…');
    const html = await fetchHtml(url);
    if(!html){ setStatus('Could not fetch the page. The site may block proxies. Try a Greenhouse or Lever URL.','error'); setLoading(false); return; }

    setStatus('Sending to Gemini AI for extraction…');
    const text = cleanText(html);
    const data = await extractWithGemini(text, url, apiKey);

    if(!data || typeof data !== 'object') throw new Error('Gemini returned invalid data');

    buildForm(data);
    setStatus('Done — review the fields below and save when ready.','success');
  }catch(e){
    setStatus('Error: '+(e.message||'Something went wrong.'),'error');
    console.error(e);
  }

  setLoading(false);
};

window.saveToFirebase = async function(){
  const data = getFormData();
  if(!data.job_title){ setStatus('Nothing to save — extract a job first.','error'); return; }
  const btn = document.getElementById('saveBtn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> Saving…';
  try{
    await db.collection('jobs').add({
      ...data,
      publishDate: new Date().toISOString().slice(0,10),
      createdAt: firebase.firestore.FieldValue.serverTimestamp(),
      savedAt: firebase.firestore.FieldValue.serverTimestamp(),
    });
    setStatus('Saved to Firestore collection "jobs" successfully.','success');
  }catch(e){ setStatus('Firebase error: '+(e.message||'Save failed.'),'error'); console.error(e); }
  btn.disabled = false;
  btn.innerHTML = '<i class="ti ti-database"></i> Save to Firebase';
};
</script>
</body>
</html>
