  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --brand: #0a7c5c;
      --brand-hover: #086b4f;
      --brand-light: #e6f4f0;
      --surface: #ffffff;
      --surface-2: #f7f8fa;
      --surface-3: #eef0f3;
      --border: rgba(0,0,0,0.07);
      --border-strong: rgba(0,0,0,0.13);
      --text-1: #0d1117;
      --text-2: #4b5563;
      --text-3: #9ca3af;
      --chat-bg: #f0f4f8;
      --radius-sm: 8px;
      --radius-md: 14px;
      --radius-lg: 20px;
      --radius-xl: 28px;
      --shadow-sm: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
      --shadow-md: 0 4px 16px rgba(0,0,0,0.08), 0 1px 4px rgba(0,0,0,0.04);
      --sidebar-w: 340px;
      /* Safe area insets for notched phones */
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
      --safe-left: env(safe-area-inset-left, 0px);
      --safe-right: env(safe-area-inset-right, 0px);
    }

    html, body {
      height: 100%;
      overflow: hidden;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--surface-2);
      color: var(--text-1);
      -webkit-font-smoothing: antialiased;
    }

    /* ─── Auth Screen ─── */
    #authBox {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 24px;
      padding-top: calc(24px + var(--safe-top));
      background: linear-gradient(135deg, #f0faf6 0%, #e8f4fe 100%);
      overflow-y: auto;
      z-index: 1000;
    }
    #authBox.visible { display: flex; }

    .auth-card {
      width: 100%;
      max-width: 400px;
      background: var(--surface);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow-md);
      padding: 40px;
      border: 1px solid var(--border);
    }

    .auth-logo { display: flex; align-items: center; gap: 10px; margin-bottom: 32px; }
    .auth-logo-mark {
      width: 40px; height: 40px;
      background: var(--brand);
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      color: #fff; flex-shrink: 0;
    }
    .auth-logo-text { font-size: 1.2rem; font-weight: 600; color: var(--text-1); letter-spacing: -0.02em; }
    .auth-title { font-size: 1.55rem; font-weight: 600; letter-spacing: -0.03em; margin-bottom: 6px; }
    .auth-subtitle { font-size: 0.9rem; color: var(--text-2); margin-bottom: 28px; }
    .auth-field { margin-bottom: 14px; }
    .auth-field input {
      width: 100%; padding: 13px 16px;
      border: 1.5px solid var(--border-strong);
      border-radius: var(--radius-md);
      font-family: inherit; font-size: 0.95rem; color: var(--text-1);
      background: var(--surface); outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    .auth-field input:focus { border-color: var(--brand); box-shadow: 0 0 0 3px rgba(10,124,92,0.1); }
    .auth-field input::placeholder { color: var(--text-3); }
    .auth-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; }
    .btn-primary {
      padding: 13px; background: var(--brand); color: #fff;
      border: none; border-radius: var(--radius-md);
      font-family: inherit; font-size: 0.95rem; font-weight: 600;
      cursor: pointer; transition: background 0.15s, transform 0.1s;
    }
    .btn-primary:hover { background: var(--brand-hover); }
    .btn-primary:active { transform: scale(0.98); }
    .btn-secondary {
      padding: 13px; background: transparent; color: var(--brand);
      border: 1.5px solid var(--brand); border-radius: var(--radius-md);
      font-family: inherit; font-size: 0.95rem; font-weight: 600;
      cursor: pointer; transition: background 0.15s;
    }
    .btn-secondary:hover { background: var(--brand-light); }
    #authStatus { margin-top: 14px; font-size: 0.85rem; color: #dc2626; text-align: center; min-height: 20px; }

    /* ─── App Shell ─── */
    #container {
      display: none;
      width: 100%;
      height: 100dvh;
      /* account for navbar above if present */
      background: var(--surface);
      overflow: hidden;
    }
    #container.app-visible { display: flex; }

    /* ─── Sidebar ─── */
    .sidebar {
      width: var(--sidebar-w);
      min-width: var(--sidebar-w);
      max-width: var(--sidebar-w);
      display: flex;
      flex-direction: column;
      background: var(--surface);
      border-right: 1px solid var(--border);
      position: relative;
      z-index: 10;
      height: 100%;
      overflow: hidden;
    }

    .sidebar-header {
      padding: 16px 16px 12px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .sidebar-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
    .sidebar-title { font-size: 1.25rem; font-weight: 600; letter-spacing: -0.02em; }

    .icon-btn {
      width: 36px; height: 36px; border-radius: 50%;
      border: none; background: transparent; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      color: var(--text-2); transition: background 0.15s, color 0.15s;
      flex-shrink: 0;
    }
    .icon-btn:hover { background: var(--surface-3); color: var(--text-1); }

    .search-wrap { position: relative; display: flex; align-items: center; }
    .search-wrap svg { position: absolute; left: 11px; color: var(--text-3); pointer-events: none; flex-shrink: 0; }
    .search-input {
      width: 100%; padding: 9px 12px 9px 36px;
      background: var(--surface-2); border: 1px solid var(--border);
      border-radius: var(--radius-md); font-family: inherit;
      font-size: 0.87rem; color: var(--text-1); outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    .search-input:focus { border-color: var(--brand); box-shadow: 0 0 0 3px rgba(10,124,92,0.08); background: var(--surface); }
    .search-input::placeholder { color: var(--text-3); }

    #left { flex: 1; overflow-y: auto; overscroll-behavior: contain; }
    #left::-webkit-scrollbar { width: 3px; }
    #left::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 3px; }

    /* Chat list items */
    .chat-item {
      display: flex; align-items: center; gap: 11px;
      padding: 11px 16px; cursor: pointer;
      transition: background 0.12s; position: relative;
      border-bottom: 1px solid var(--border);
    }
    .chat-item:last-child { border-bottom: none; }
    .chat-item:hover { background: var(--surface-2); }
    .chat-item.active { background: var(--brand-light); }
    .chat-item.active::before {
      content: ''; position: absolute; left: 0; top: 10px; bottom: 10px;
      width: 3px; background: var(--brand); border-radius: 0 3px 3px 0;
    }

    .avatar {
      width: 44px; height: 44px; border-radius: 50%;
      background: var(--brand-light); color: var(--brand);
      display: flex; align-items: center; justify-content: center;
      font-weight: 600; font-size: 1rem; flex-shrink: 0;
    }
    .avatar.sm { width: 40px; height: 40px; font-size: 0.95rem; }

    .chat-meta { flex: 1; min-width: 0; }
    .chat-name { font-size: 0.91rem; font-weight: 500; color: var(--text-1); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .chat-item.unread .chat-name { font-weight: 700; }
    .chat-preview { font-size: 0.8rem; color: var(--text-3); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 2px; }
    .chat-item.unread .chat-preview { color: var(--text-2); font-weight: 500; }

    .chat-right { display: flex; flex-direction: column; align-items: flex-end; gap: 5px; flex-shrink: 0; }
    .unread-dot {
      min-width: 20px; height: 20px; padding: 0 5px;
      background: var(--brand); color: #fff;
      font-size: 0.7rem; font-weight: 700; border-radius: 999px;
      display: flex; align-items: center; justify-content: center;
    }

    .chat-opts-wrap { position: relative; }
    .chat-opts-btn {
      width: 26px; height: 26px; border-radius: 50%; border: none;
      background: transparent; color: var(--text-3); cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 1rem; transition: background 0.12s, color 0.12s;
    }
    .chat-opts-btn:hover { background: var(--surface-3); color: var(--text-1); }
    .chat-opts-menu {
      position: absolute; right: 0; top: 30px; min-width: 158px;
      background: var(--surface); border: 1px solid var(--border-strong);
      border-radius: var(--radius-md); box-shadow: var(--shadow-md);
      z-index: 80; overflow: hidden;
    }
    .chat-opts-menu.hidden { display: none; }
    .chat-opts-menu button {
      display: block; width: 100%; padding: 10px 14px; text-align: left;
      font-size: 0.86rem; font-family: inherit; color: var(--text-1);
      background: none; border: none; cursor: pointer; transition: background 0.1s;
    }
    .chat-opts-menu button:hover { background: var(--surface-2); }
    .chat-opts-menu button.danger { color: #dc2626; }

    /* ─── New Chat Panel ─── */
    .side-panel {
      position: absolute; top: 0; left: -100%; width: 100%; height: 100%;
      background: var(--surface); z-index: 50;
      transition: left 0.28s cubic-bezier(0.2,0,0,1);
      display: flex; flex-direction: column;
    }
    .side-panel.active { left: 0; }
    .panel-header {
      background: var(--brand); color: #fff; padding: 16px 16px;
      display: flex; align-items: center; gap: 12px; flex-shrink: 0;
    }
    .panel-header h3 { font-size: 1.05rem; font-weight: 600; }
    .panel-header p { font-size: 0.78rem; opacity: 0.8; margin-top: 2px; }
    .panel-search { padding: 10px 14px; background: var(--surface-2); border-bottom: 1px solid var(--border); flex-shrink: 0; }
    #newChatUsers { overflow-y: auto; flex: 1; overscroll-behavior: contain; }
    .contact-item {
      display: flex; align-items: center; gap: 12px; padding: 11px 16px;
      cursor: pointer; transition: background 0.12s; border-bottom: 1px solid var(--border);
    }
    .contact-item:hover { background: var(--surface-2); }
    .contact-name { font-size: 0.88rem; font-weight: 500; color: var(--text-1); }
    .contact-email { font-size: 0.78rem; color: var(--text-3); margin-top: 1px; }

    /* ─── Chat Area ─── */
    #right {
      flex: 1; display: flex; flex-direction: column;
      background: var(--chat-bg); position: relative;
      overflow: hidden; min-width: 0;
    }

    #chatHeader {
      background: var(--surface); border-bottom: 1px solid var(--border);
      padding: 0 14px; min-height: 60px; max-height: 60px;
      display: flex; align-items: center; gap: 12px;
      z-index: 5; box-shadow: var(--shadow-sm); flex-shrink: 0;
    }
    .header-info { flex: 1; min-width: 0; }
    .header-name { font-size: 0.95rem; font-weight: 600; color: var(--text-1); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .header-status { font-size: 0.75rem; color: var(--brand); margin-top: 1px; }
    .header-placeholder { color: var(--text-3); font-size: 0.9rem; }

    #messages {
      flex: 1; padding: 20px 16px; overflow-y: auto;
      display: flex; flex-direction: column; gap: 2px;
      overscroll-behavior: contain;
    }
    #messages::-webkit-scrollbar { width: 3px; }
    #messages::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.1); border-radius: 3px; }

    .msg-wrapper { display: flex; width: 100%; margin-bottom: 1px; }
    .msg-wrapper.sent { justify-content: flex-end; }
    .msg-wrapper.received { justify-content: flex-start; }

    .msg {
      max-width: 65%; padding: 9px 13px;
      font-size: 0.9rem; line-height: 1.5;
      border-radius: var(--radius-lg); word-break: break-word;
      animation: msgIn 0.16s ease-out;
    }
    @keyframes msgIn { from { opacity:0; transform: translateY(5px) scale(0.97); } to { opacity:1; transform:none; } }
    .msg.sent { background: var(--brand); color: #fff; border-bottom-right-radius: 4px; }
    .msg.received { background: var(--surface); color: var(--text-1); border-bottom-left-radius: 4px; box-shadow: var(--shadow-sm); }

    /* ─── Input bar ─── */
    #inputBox {
      display: none; align-items: center; gap: 8px;
      padding: 10px 14px;
      padding-bottom: calc(10px + var(--safe-bottom));
      background: var(--surface); border-top: 1px solid var(--border);
      flex-shrink: 0;
    }
    #msgInput {
      flex: 1; padding: 11px 15px;
      background: var(--surface-2); border: 1.5px solid var(--border);
      border-radius: var(--radius-xl); font-family: inherit;
      font-size: 0.93rem; color: var(--text-1); outline: none;
      transition: border-color 0.15s, background 0.15s;
    }
    #msgInput:focus { border-color: var(--brand); background: var(--surface); }
    #msgInput::placeholder { color: var(--text-3); }
    .input-action-btn {
      width: 40px; height: 40px; border-radius: 50%; border: none;
      background: var(--surface-2); color: var(--text-2); cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.15s; flex-shrink: 0;
    }
    .input-action-btn:hover { background: var(--surface-3); }
    #sendBtn {
      width: 40px; height: 40px; border-radius: 50%; border: none;
      background: var(--brand); color: #fff; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; transition: background 0.15s, transform 0.1s;
    }
    #sendBtn:hover { background: var(--brand-hover); }
    #sendBtn:active { transform: scale(0.92); }

    /* ─── Empty / notices ─── */
    .empty-state {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; height: 100%; text-align: center; padding: 40px;
    }
    .empty-icon {
      width: 76px; height: 76px; border-radius: 50%;
      background: var(--brand-light); display: flex; align-items: center;
      justify-content: center; margin-bottom: 18px; color: var(--brand);
    }
    .empty-title { font-size: 1.15rem; font-weight: 500; color: var(--text-2); margin-bottom: 6px; }
    .empty-sub { font-size: 0.85rem; color: var(--text-3); max-width: 220px; line-height: 1.6; }
    .encrypted-notice {
      font-size: 0.75rem; color: var(--text-3);
      background: rgba(255,255,255,0.75); padding: 5px 14px;
      border-radius: 999px; margin: 0 auto 12px; display: inline-block;
    }
    .no-chats { padding: 44px 20px; text-align: center; color: var(--text-3); font-size: 0.85rem; }
    .no-chats svg { margin-bottom: 10px; color: var(--brand); opacity: 0.35; }

    /* ─── Contact Modal ─── */
    .modal-backdrop {
      position: fixed; inset: 0; background: rgba(15,23,42,0.4);
      z-index: 200; display: none; align-items: center; justify-content: center;
      padding: 20px; backdrop-filter: blur(4px);
    }
    .modal-backdrop.active { display: flex; }
    .modal {
      width: 100%; max-width: 350px; background: var(--surface);
      border-radius: var(--radius-xl); box-shadow: 0 24px 60px rgba(0,0,0,0.18);
      overflow: hidden; animation: modalIn 0.18s ease-out;
    }
    @keyframes modalIn { from { opacity:0; transform: scale(0.95) translateY(8px); } to { opacity:1; transform:none; } }
    .modal-header {
      padding: 18px 20px; background: var(--brand); color: #fff;
      display: flex; align-items: center; justify-content: space-between;
    }
    .modal-header h3 { font-size: 1rem; font-weight: 600; }
    .modal-close {
      width: 28px; height: 28px; border-radius: 50%; border: none;
      background: rgba(255,255,255,0.15); color: #fff; cursor: pointer;
      font-size: 1.1rem; display: flex; align-items: center; justify-content: center;
      transition: background 0.12s;
    }
    .modal-close:hover { background: rgba(255,255,255,0.25); }
    .modal-body { padding: 28px; text-align: center; }
    .modal-avatar {
      width: 68px; height: 68px; border-radius: 50%;
      background: var(--brand-light); color: var(--brand);
      font-size: 1.5rem; font-weight: 700;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 14px;
    }
    .modal-name { font-size: 1.1rem; font-weight: 600; color: var(--text-1); }
    .modal-email { font-size: 0.83rem; color: var(--text-3); margin-top: 4px; word-break: break-all; }

    /* ─── Back button — shown when chat is open ─── */
    #chatBackBtn {
      display: none; /* shown via JS when chat opens */
    }

    /* ─── Responsive ─── */
    @media (max-width: 768px) {
      :root { --sidebar-w: 100vw; }

      #container { position: relative; }

      .sidebar {
        width: 100%; min-width: 100%; max-width: 100%;
        padding-top: var(--safe-top);
      }

      /* Chat panel slides in over the sidebar on mobile */
      #right {
        position: absolute; inset: 0;
        transform: translateX(100%);
        transition: transform 0.28s cubic-bezier(0.2,0,0,1);
        z-index: 20;
        padding-top: var(--safe-top);
      }
      #container.mobile-chat-open #right { transform: translateX(0); }

      /* Always show back btn on mobile when chat is open */
      #container.mobile-chat-open #chatBackBtn { display: flex !important; }

      .msg { max-width: 78%; }

      .auth-card { padding: 28px 24px; border-radius: var(--radius-lg); }
    }

    @media (min-width: 769px) {
      /* Back btn always visible on desktop when chat is open */
      #chatBackBtn { display: flex !important; }
    }
  </style>
</head>

<!-- Auth Screen -->
<div id="authBox">

    <div class="auth-field"><input id="password" type="password" placeholder="Password" autocomplete="current-password"></div>
    <div class="auth-actions">
      <button class="btn-primary" onclick="login()">Sign in</button>
      <button class="btn-secondary" onclick="signup()">Create account</button>
    </div>
    <p id="authStatus"></p>
  </div>
</div>

<!-- Main App -->
<div id="container">
  <!-- Sidebar -->
  <aside class="sidebar" id="chatSidebar">
    <!-- New Chat Panel -->
    <div id="sidePanel" class="side-panel">
      <div class="panel-header">
        <button id="closeSidePanel" class="icon-btn" style="color:#fff;background:rgba(255,255,255,0.15);" aria-label="Close">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
        </button>
        <div>
          <h3>New conversation</h3>
          <p id="contactCount">0 contacts</p>
        </div>
      </div>
      <div class="panel-search">
        <div class="search-wrap">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input id="newChatSearch" class="search-input" type="text" placeholder="Search name or email">
        </div>
      </div>
      <div id="newChatUsers"></div>
    </div>

    <!-- Sidebar Header -->
    <div class="sidebar-header">
      <div class="sidebar-top">
        <span class="sidebar-title">Messages</span>
        <button id="newChatBtn" class="icon-btn" aria-label="New chat" title="New conversation">
          <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/><line x1="12" y1="8" x2="12" y2="14"/><line x1="9" y1="11" x2="15" y2="11"/></svg>
        </button>
      </div>
      <div class="search-wrap">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input id="userSearch" class="search-input" type="text" placeholder="Search chats…">
      </div>
    </div>

    <div id="left"></div>
  </aside>

  <!-- Chat area -->
  <section id="right">
    <div id="chatHeader">
      <span class="header-placeholder">Select a conversation to start</span>
    </div>
    <div id="messages">
      <div class="empty-state">
        <div class="empty-icon">
          <svg width="34" height="34" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
        </div>
        <p class="empty-title">BooterSpace Messages</p>
        <p class="empty-sub">Connect with recruiters, employers, and peers</p>
      </div>
    </div>
    <div id="inputBox">
      <button class="input-action-btn" aria-label="Emoji">
        <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M8 14s1.5 2 4 2 4-2 4-2"/><line x1="9" y1="9" x2="9.01" y2="9"/><line x1="15" y1="9" x2="15.01" y2="9"/></svg>
      </button>
      <input id="msgInput" placeholder="Type a message…">
      <button id="sendBtn" onclick="sendMessage()" aria-label="Send">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
      </button>
    </div>
  </section>
</div>

<!-- Contact Info Modal -->
<div id="contactModalBackdrop" class="modal-backdrop">
  <div class="modal" role="dialog" aria-modal="true" aria-labelledby="contactModalName">
    <div class="modal-header">
      <h3>Contact info</h3>
      <button id="closeContactModal" class="modal-close" aria-label="Close">×</button>
    </div>
    <div class="modal-body">
      <div id="contactModalAvatar" class="modal-avatar">U</div>
      <p id="contactModalName" class="modal-name">User</p>
      <p id="contactModalEmail" class="modal-email"></p>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp, getApp, getApps } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
import {
  getFirestore, collection, addDoc, getDocs, getDoc,
  query, where, orderBy, onSnapshot, doc, setDoc, serverTimestamp, limit, increment
} from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";
import {
  getAuth, createUserWithEmailAndPassword,
  signInWithEmailAndPassword, onAuthStateChanged, signOut, signInWithCustomToken
} from "https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js";

/* ── env ── */
function getEnvVar(...keys) {
  const e = window.__ENV__ || {};
  for (const k of keys) { if (e[k]) return e[k]; }
  return "";
}
const firebaseConfig = {
  apiKey: getEnvVar("VITE_FIREBASE_API_KEY","NEXT_PUBLIC_FIREBASE_API_KEY","REACT_APP_FIREBASE_API_KEY"),
  authDomain: getEnvVar("VITE_FIREBASE_AUTH_DOMAIN","NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN","REACT_APP_FIREBASE_AUTH_DOMAIN"),
  databaseURL: getEnvVar("VITE_FIREBASE_DATABASE_URL","NEXT_PUBLIC_FIREBASE_DATABASE_URL","REACT_APP_FIREBASE_DATABASE_URL"),
  projectId: getEnvVar("VITE_FIREBASE_PROJECT_ID","NEXT_PUBLIC_FIREBASE_PROJECT_ID","REACT_APP_FIREBASE_PROJECT_ID"),
  storageBucket: getEnvVar("VITE_FIREBASE_STORAGE_BUCKET","NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET","REACT_APP_FIREBASE_STORAGE_BUCKET"),
  messagingSenderId: getEnvVar("VITE_FIREBASE_MESSAGING_SENDER_ID","NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID","REACT_APP_FIREBASE_MESSAGING_SENDER_ID"),
  appId: getEnvVar("VITE_FIREBASE_APP_ID","NEXT_PUBLIC_FIREBASE_APP_ID","REACT_APP_FIREBASE_APP_ID"),
  measurementId: getEnvVar("VITE_FIREBASE_MEASUREMENT_ID","NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID","REACT_APP_FIREBASE_MEASUREMENT_ID")
};

const app = getApps().length ? getApp() : initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

/* ── State ── */
let CURRENT_USER = null;
let currentChatUser = null;
let currentChatId = null;
let unsubscribeMessages = null;
let unsubscribeChats = null;
let unsubscribePresence = null;   // ← presence listener
let hasAutoOpenedLatestChat = false;
const pendingOpenChatId = new URLSearchParams(window.location.search).get("chatId");
const pendingComposeTo  = new URLSearchParams(window.location.search).get("composeTo");
let allUsers = [];
let activeChats = [];

/* ── DOM refs ── */
const left                 = document.getElementById("left");
const userSearch           = document.getElementById("userSearch");
const newChatSearch        = document.getElementById("newChatSearch");
const messagesBox          = document.getElementById("messages");
const newChatBtn           = document.getElementById("newChatBtn");
const sidePanel            = document.getElementById("sidePanel");
const closeSidePanel       = document.getElementById("closeSidePanel");
const newChatUsers         = document.getElementById("newChatUsers");
const contactCount         = document.getElementById("contactCount");
const inputBox             = document.getElementById("inputBox");
const container            = document.getElementById("container");
const authBox              = document.getElementById("authBox");
const contactModalBackdrop = document.getElementById("contactModalBackdrop");
const closeContactModal    = document.getElementById("closeContactModal");
const chatHeader           = document.getElementById("chatHeader");

/* ── Helpers ── */
function escapeHtml(v = "") {
  return v.toString().replace(/[&<>'"]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;","'":"&#39;",'"':"&quot;"}[c]));
}
function getMapValueForUser(map, uid) {
  if (!map || typeof map !== "object" || !uid) return undefined;
  if (Object.prototype.hasOwnProperty.call(map, uid)) return map[uid];
  return uid.split(".").reduce((v, s) => (!v || typeof v !== "object") ? undefined : v[s], map);
}
function getUnreadCount(chat) {
  if (!chat || !CURRENT_USER) return 0;
  const v = getMapValueForUser(chat.unreadBy, CURRENT_USER);
  return v !== undefined ? (Number(v) || 0) : 0;
}
function isChatDeletedForCurrentUser(chat) {
  return getMapValueForUser(chat?.deletedFor, CURRENT_USER) === true;
}
function formatUnreadCount(n) { return n > 99 ? "99+" : String(n); }
function closeAllChatMenus() {
  document.querySelectorAll(".chat-opts-menu").forEach(m => m.classList.add("hidden"));
}
function isMobileView() { return window.matchMedia("(max-width: 768px)").matches; }
function getChatId(a, b) { return [a, b].sort().join("_"); }
function safeNameFromUser(d, fallback) { return d?.name || d?.email || fallback || "Unknown User"; }
function getPartnerIdFromChat(chat) { return (chat.participants || []).find(p => p !== CURRENT_USER) || null; }
function showChatError(msg) {
  messagesBox.innerHTML = `<div style="margin:auto;text-align:center;font-size:.88rem;color:#dc2626;padding:24px">${msg}</div>`;
}

/* ── Mobile back-button (history API) ──
   Push a dummy state when a chat opens. When the user presses the hardware/
   browser back button we catch the popstate event and go back to the list
   instead of navigating away from the page. */
let chatHistoryPushed = false;
function pushChatHistory() {
  if (!chatHistoryPushed) {
    history.pushState({ booterChat: true }, "");
    chatHistoryPushed = true;
  }
}
window.addEventListener("popstate", e => {
  if (chatHistoryPushed && container.classList.contains("mobile-chat-open")) {
    // intercept: slide back to sidebar
    closeChatView();
    chatHistoryPushed = false;
    // prevent true navigation by pushing a new neutral state
    history.pushState(null, "");
  }
});

/* ── Panel / mobile helpers ── */
function setMobileChatOpen(open) {
  if (!container) return;
  const isMob = isMobileView();
  container.classList.toggle("mobile-chat-open", open && isMob);
  if (open) {
    pushChatHistory();
  } else {
    chatHistoryPushed = false;
  }
}

function closeChatView() {
  container.classList.remove("mobile-chat-open");
}

function togglePanel(show) {
  sidePanel.classList.toggle("active", show);
  if (show) newChatSearch.focus();
}

/* ── Presence: write own online status ── */
function setPresenceOnline(uid) {
  if (!uid) return;
  const presRef = doc(db, "presence", uid);
  setDoc(presRef, { online: true, lastSeen: serverTimestamp() }, { merge: true });
  // Mark offline on page hide / unload
  const markOffline = () => {
    navigator.sendBeacon
      ? navigator.sendBeacon("/dev/null") // placeholder; real offline needs Cloud Functions
      : null;
    setDoc(presRef, { online: false, lastSeen: serverTimestamp() }, { merge: true });
  };
  document.addEventListener("visibilitychange", () => {
    if (document.visibilityState === "hidden") markOffline();
    else setDoc(presRef, { online: true, lastSeen: serverTimestamp() }, { merge: true });
  });
  window.addEventListener("beforeunload", markOffline);
}

/* ── Listen to partner's presence, update header ── */
function listenToPartnerPresence(partnerId) {
  if (unsubscribePresence) { unsubscribePresence(); unsubscribePresence = null; }
  if (!partnerId) return;
  unsubscribePresence = onSnapshot(doc(db, "presence", partnerId), snap => {
    const statusEl = document.getElementById("partnerStatus");
    if (!statusEl) return;
    const data = snap.exists() ? snap.data() : null;
    if (data && data.online === true) {
      statusEl.textContent = "● Active now";
      statusEl.style.color = "var(--brand)";
    } else {
      statusEl.textContent = "";
    }
  });
}

/* ── Render chat header (with real back btn) ── */
function renderChatHeader(safeName, initials) {
  chatHeader.innerHTML = `
    <button id="chatBackBtn" class="icon-btn" aria-label="Back to chats" title="Back">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="19" y1="12" x2="5" y2="12"/>
        <polyline points="12 19 5 12 12 5"/>
      </svg>
    </button>
    <div class="avatar sm">${escapeHtml(initials)}</div>
    <div class="header-info">
      <div class="header-name">${escapeHtml(safeName)}</div>
      <div id="partnerStatus" class="header-status"></div>
    </div>
  `;
  document.getElementById("chatBackBtn").addEventListener("click", () => {
    setMobileChatOpen(false);
    // On desktop back btn just closes the chat view (no-op since sidebar always visible)
  });
}

/* ── Event bindings ── */
newChatBtn.onclick = () => { newChatSearch.value = ""; renderNewChatUsers(""); togglePanel(true); };
closeSidePanel.onclick = () => togglePanel(false);
closeContactModal.onclick = () => contactModalBackdrop.classList.remove("active");
contactModalBackdrop.onclick = e => { if (e.target === contactModalBackdrop) contactModalBackdrop.classList.remove("active"); };
document.addEventListener("click", e => { if (e.target instanceof Element && !e.target.closest(".chat-opts-wrap")) closeAllChatMenus(); });

/* ── Auth ── */
window.signup = async () => {
  try {
    setAuthStatus("");
    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value;
    if (!email || !password) return setAuthStatus("Email and password are required.");
    const uc = await createUserWithEmailAndPassword(auth, email, password);
    await setDoc(doc(db, "users", uc.user.uid), { name: email.split("@")[0], email, uid: uc.user.uid, createdAt: Date.now() });
  } catch (e) { setAuthStatus(e.message); }
};

window.login = async () => {
  try {
    setAuthStatus("");
    await signInWithEmailAndPassword(auth, document.getElementById("email").value.trim(), document.getElementById("password").value);
  } catch (e) { setAuthStatus(e.message); }
};

window.bindChatLogout = function() {
  const b1 = document.getElementById("logoutBtn");
  const b2 = document.getElementById("mLogoutBtn");
  if (b1) b1.onclick = () => signOut(auth);
  if (b2) b2.onclick = () => signOut(auth);
};

function setAuthStatus(t) { document.getElementById("authStatus").textContent = t; }

/* ── User list ── */
async function loadAllUsers() {
  if (!CURRENT_USER) return;
  const snap = await getDocs(query(collection(db, "users"), limit(500)));
  allUsers = snap.docs.map(d => ({ id: d.id, name: safeNameFromUser(d.data(), d.id), email: d.data()?.email || "" }));
  contactCount.textContent = `${Math.max(0, allUsers.length - 1)} contacts`;
  renderNewChatUsers("");
}

/* ── Chat list listener ── */
function listenToChats() {
  if (!CURRENT_USER) return;
  if (unsubscribeChats) unsubscribeChats();
  const q = query(collection(db, "chats"), where("participants", "array-contains", CURRENT_USER), orderBy("timestamp", "desc"));
  unsubscribeChats = onSnapshot(q, snap => {
    activeChats = snap.docs.map(d => ({ chatId: d.id, ...d.data() }));
    renderChatList();
    if (!hasAutoOpenedLatestChat && (pendingOpenChatId || pendingComposeTo)) {
      const rc = pendingOpenChatId ? activeChats.find(c => c.chatId === pendingOpenChatId) : null;
      const compose = pendingComposeTo ? { participants: [CURRENT_USER, pendingComposeTo] } : null;
      const target = rc || compose;
      const pId = getPartnerIdFromChat(target || {});
      if (pId) {
        const partner = allUsers.find(u => u.id === pId);
        hasAutoOpenedLatestChat = true;
        openChat(pId, partner?.name || pId || "User");
      }
    }
  }, err => console.error("Chat list error:", err));
}

/* ── Render sidebar list ── */
function renderChatList(filter = "") {
  left.innerHTML = "";
  const term = filter.toLowerCase();
  const visible = activeChats.filter(c => !isChatDeletedForCurrentUser(c));
  const filtered = visible.filter(chat => {
    const pId = getPartnerIdFromChat(chat);
    const partner = allUsers.find(u => u.id === pId);
    const name = (partner?.name || pId || "").toLowerCase();
    return name.includes(term) || (chat.lastMessage || "").toLowerCase().includes(term);
  });

  if (filtered.length === 0) {
    left.innerHTML = `<div class="no-chats"><svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg><br>No conversations yet.<br>Tap the icon above to start one.</div>`;
    return;
  }

  filtered.forEach(chat => {
    const pId = getPartnerIdFromChat(chat);
    const partner = allUsers.find(u => u.id === pId);
    const displayName = partner?.name || "User";
    const initials = displayName[0].toUpperCase();
    const unread = getUnreadCount(chat);
    const unreadText = formatUnreadCount(unread);

    const div = document.createElement("div");
    div.className = `chat-item${chat.chatId === currentChatId ? " active" : ""}${unread > 0 ? " unread" : ""}`;
    div.innerHTML = `
      <div class="avatar">${escapeHtml(initials)}</div>
      <div class="chat-meta">
        <div class="chat-name">${escapeHtml(displayName)}</div>
        <div class="chat-preview">${escapeHtml(chat.lastMessage || "…")}</div>
      </div>
      <div class="chat-right">
        ${unread > 0 ? `<span class="unread-dot" aria-label="${unread} unread">${escapeHtml(unreadText)}</span>` : ""}
        <div class="chat-opts-wrap">
          <button class="chat-opts-btn" type="button" aria-label="Options">⋯</button>
          <div class="chat-opts-menu hidden">
            <button type="button" data-action="view-contact">View contact</button>
            <button type="button" data-action="delete-chat" class="danger">Delete chat</button>
          </div>
        </div>
      </div>
    `;
    div.addEventListener("click", () => openChat(pId, displayName));
    div.querySelector(".chat-opts-btn").addEventListener("click", e => {
      e.stopPropagation();
      const menu = div.querySelector(".chat-opts-menu");
      const shouldOpen = menu.classList.contains("hidden");
      closeAllChatMenus();
      menu.classList.toggle("hidden", !shouldOpen);
    });
    div.querySelector('[data-action="view-contact"]').addEventListener("click", e => {
      e.stopPropagation(); closeAllChatMenus();
      showContactInfo(partner || { id: pId, name: displayName, email: "" });
    });
    div.querySelector('[data-action="delete-chat"]').addEventListener("click", async e => {
      e.stopPropagation(); closeAllChatMenus();
      await deleteChat(chat.chatId);
    });
    left.appendChild(div);
  });
}

function showContactInfo(user) {
  document.getElementById("contactModalAvatar").textContent = (user.name || "U").charAt(0).toUpperCase();
  document.getElementById("contactModalName").textContent = user.name || "User";
  document.getElementById("contactModalEmail").textContent = user.email || "No email available";
  contactModalBackdrop.classList.add("active");
}

async function deleteChat(chatId) {
  if (!chatId || !CURRENT_USER) return;
  if (!window.confirm("Delete this conversation from your chat list?")) return;
  try {
    await setDoc(doc(db, "chats", chatId), { deletedFor: { [CURRENT_USER]: true } }, { merge: true });
    activeChats = activeChats.filter(c => c.chatId !== chatId);
    if (chatId === currentChatId) {
      currentChatId = null; currentChatUser = null;
      if (unsubscribeMessages) { unsubscribeMessages(); unsubscribeMessages = null; }
      if (unsubscribePresence) { unsubscribePresence(); unsubscribePresence = null; }
      inputBox.style.display = "none";
      chatHeader.innerHTML = `<span class="header-placeholder">Select a conversation to start</span>`;
      messagesBox.innerHTML = `<div class="empty-state"><div class="empty-icon"><svg width="34" height="34" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg></div><p class="empty-title">Conversation deleted</p></div>`;
      setMobileChatOpen(false);
    }
    renderChatList();
  } catch (err) { console.error("Delete error:", err); showChatError("Could not delete conversation."); }
}

function renderNewChatUsers(filter = "") {
  newChatUsers.innerHTML = "";
  const term = filter.trim().toLowerCase();
  const list = allUsers.filter(u => u.id !== CURRENT_USER && (u.name?.toLowerCase().includes(term) || u.email?.toLowerCase().includes(term)));
  if (list.length === 0) {
    newChatUsers.innerHTML = `<div style="padding:36px 20px;text-align:center;color:var(--text-3);font-size:.86rem;">No results${filter ? ` for "${escapeHtml(filter)}"` : ""}</div>`;
    return;
  }
  list.forEach(user => {
    const div = document.createElement("div");
    div.className = "contact-item";
    const initials = (user.name || "U")[0].toUpperCase();
    div.innerHTML = `
      <div class="avatar sm">${escapeHtml(initials)}</div>
      <div>
        <div class="contact-name">${escapeHtml(user.name || "User")}</div>
        <div class="contact-email">${escapeHtml(user.email)}</div>
      </div>
    `;
    div.onclick = async () => {
      try { await createOrOpenChat(user.id, user.name); togglePanel(false); }
      catch (err) { console.error("Open chat error:", err); showChatError("Could not open chat. Please try again."); }
    };
    newChatUsers.appendChild(div);
  });
}

/* ── Open chat ── */
window.openChat = async (partnerId, partnerName) => {
  currentChatUser = partnerId;
  currentChatId = getChatId(CURRENT_USER, partnerId);
  const safeName = partnerName || "User";
  const initials = safeName.charAt(0).toUpperCase();

  await setDoc(doc(db, "chats", currentChatId), {
    unreadBy: { [CURRENT_USER]: 0 },
    deletedFor: { [CURRENT_USER]: false }
  }, { merge: true });

  renderChatHeader(safeName, initials);
  listenToPartnerPresence(partnerId);   // ← real presence only for this partner

  messagesBox.innerHTML = `<div style="margin:auto;color:var(--text-3);font-size:.85rem;">Loading…</div>`;
  inputBox.style.display = "flex";

  if (unsubscribeMessages) unsubscribeMessages();
  const q = query(collection(db, "messages"), where("chatId", "==", currentChatId), orderBy("time", "asc"));
  unsubscribeMessages = onSnapshot(q, snap => {
    messagesBox.innerHTML = "";
    if (snap.empty) {
      messagesBox.innerHTML = `<div style="text-align:center;margin-top:auto;padding-bottom:12px"><span class="encrypted-notice">🔒 End-to-end encrypted</span></div>`;
    } else {
      snap.forEach(ds => {
        const m = ds.data();
        const wrapper = document.createElement("div");
        const isSender = m.sender === CURRENT_USER;
        wrapper.className = `msg-wrapper ${isSender ? "sent" : "received"}`;
        const bubble = document.createElement("div");
        bubble.className = `msg ${isSender ? "sent" : "received"}`;
        bubble.textContent = m.text;
        wrapper.appendChild(bubble);
        messagesBox.appendChild(wrapper);
      });
      messagesBox.scrollTop = messagesBox.scrollHeight;
    }
  }, err => { console.error("Messages error:", err); showChatError("Could not load messages."); });

  setMobileChatOpen(true);
  renderChatList();
};

async function createOrOpenChat(partnerId, partnerName) {
  if (!CURRENT_USER || !partnerId) return;
  const chatId = getChatId(CURRENT_USER, partnerId);
  const chatRef = doc(db, "chats", chatId);
  const existing = await getDoc(chatRef);
  if (!existing.exists()) {
    await setDoc(chatRef, { participants: [CURRENT_USER, partnerId], lastMessage: "", timestamp: serverTimestamp() }, { merge: true });
  }
  await openChat(partnerId, partnerName || "User");
}

/* ── Send message ── */
window.sendMessage = async () => {
  const input = document.getElementById("msgInput");
  const text = input.value.trim();
  if (!text || !currentChatId) return;
  input.value = "";
  if (isMobileView()) input.focus();
  try {
    await addDoc(collection(db, "messages"), { chatId: currentChatId, sender: CURRENT_USER, receiver: currentChatUser, text, time: serverTimestamp() });
    await setDoc(doc(db, "chats", currentChatId), {
      participants: [CURRENT_USER, currentChatUser],
      lastMessage: text,
      lastSenderId: CURRENT_USER,
      timestamp: serverTimestamp(),
      unreadBy: { [currentChatUser]: increment(1), [CURRENT_USER]: 0 },
      deletedFor: { [CURRENT_USER]: false, [currentChatUser]: false }
    }, { merge: true });
    if (isMobileView()) input.focus();
  } catch (err) { console.error("Send error:", err); }
};

userSearch.oninput = e => renderChatList(e.target.value);
newChatSearch.oninput = e => renderNewChatUsers(e.target.value);
document.getElementById("msgInput").onkeydown = e => { if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendMessage(); } };
document.getElementById("sendBtn")?.addEventListener("pointerdown", e => e.preventDefault());

/* ── Auth state ── */
const EMPTY_STATE_HTML = `
  <div class="empty-state">
    <div class="empty-icon">
      <svg width="34" height="34" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
    </div>
    <p class="empty-title">BooterSpace Messages</p>
    <p class="empty-sub">Connect with recruiters, employers, and peers</p>
  </div>`;

onAuthStateChanged(auth, async user => {
  if (user) {
    CURRENT_USER = user.uid;
    hasAutoOpenedLatestChat = false;
    authBox.classList.remove("visible");
    container.classList.add("app-visible");
    document.getElementById("logoutBtn")?.classList.remove("hidden");
    setPresenceOnline(CURRENT_USER);
    await loadAllUsers();
    listenToChats();
  } else {
    CURRENT_USER = null;
    if (unsubscribeMessages) { unsubscribeMessages(); unsubscribeMessages = null; }
    if (unsubscribeChats) { unsubscribeChats(); unsubscribeChats = null; }
    if (unsubscribePresence) { unsubscribePresence(); unsubscribePresence = null; }
    activeChats = []; allUsers = [];
    currentChatUser = null; currentChatId = null;
    hasAutoOpenedLatestChat = false;
    messagesBox.innerHTML = EMPTY_STATE_HTML;
    inputBox.style.display = "none";
    chatHeader.innerHTML = `<span class="header-placeholder">Select a conversation to start</span>`;
    renderChatList();
    container.classList.remove("app-visible");
    authBox.classList.add("visible");
    document.getElementById("logoutBtn")?.classList.add("hidden");
  }
});

const initAuth = async () => {
  if (typeof __initial_auth_token !== "undefined" && __initial_auth_token) {
    await signInWithCustomToken(auth, __initial_auth_token).catch(() => null);
  }
};
window.bindChatLogout();
initAuth();

window.addEventListener("resize", () => { if (!isMobileView()) container.classList.remove("mobile-chat-open"); });
</script>
<script type="module" src="public/js/analytics.js"></script>
<script type="module" src="public/js/browser-notifications.js"></script>
</body>
