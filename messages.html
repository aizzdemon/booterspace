<!DOCTYPE html>
<html>
<head>
  <title>Messaging App</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { margin:0; font-family:Arial; background:#f3f2ef; }
    #container { display:flex; height:100vh; }

    #left { width:30%; background:#fff; border-right:1px solid #ddd; overflow:auto; }
    #right { width:70%; display:flex; flex-direction:column; }

    .chatItem { padding:15px; border-bottom:1px solid #eee; cursor:pointer; }
    .chatItem:hover { background:#f5f5f5; }

    #messages { flex:1; padding:15px; overflow:auto; }

    .msg { margin:10px 0; padding:10px; border-radius:10px; max-width:60%; }
    .sent { background:#0a66c2; color:#fff; margin-left:auto; }
    .received { background:#e4e6eb; }

    #inputBox { display:flex; padding:10px; background:#fff; }
    #inputBox input { flex:1; padding:10px; }
    #inputBox button { margin-left:10px; padding:10px; background:#0a66c2; color:#fff; border:none; }

    #authBox { width:300px; margin:100px auto; background:#fff; padding:20px; border:1px solid #ccc; }
  </style>
</head>

<body>

<div id="authBox">
  <h3>Login / Signup</h3>
  <input id="email" placeholder="Email"><br><br>
  <input id="password" type="password" placeholder="Password"><br><br>
  <button onclick="signup()">Signup</button>
  <button onclick="login()">Login</button>
</div>

<div id="container" style="display:none">

  <div id="left">
    <button onclick="openNewChat()">➕ New Chat</button>
    <div id="chatList"></div>
  </div>

  <div id="right">
    <div id="chatHeader">Select Chat</div>
    <div id="messages"></div>

    <div id="inputBox">
      <input id="msgInput">
      <button onclick="sendMessage()">Send</button>
    </div>
  </div>

</div>

<!-- Modal -->
<div id="modal" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5)">
  <div style="background:#fff;width:300px;margin:100px auto;padding:10px">
    <h4>Select User</h4>
    <div id="userList"></div>
  </div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
  getFirestore, collection, addDoc, getDocs,
  query, where, orderBy, onSnapshot, doc, setDoc
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

import {
  getAuth, createUserWithEmailAndPassword,
  signInWithEmailAndPassword, onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyBeGZBE1u1-y1hDWbRouchgwkgp89D973I",
  authDomain: "kar-kardan.firebaseapp.com",
  projectId: "kar-kardan"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

let CURRENT_USER = null;
let currentChatUser = null;
let unsubscribe = null;

/* AUTH */

window.signup = async () => {
  const cred = await createUserWithEmailAndPassword(auth, email.value, password.value);

  await setDoc(doc(db,"users",cred.user.uid),{
    name: email.value,
    email: email.value
  });
};

window.login = async () => {
  await signInWithEmailAndPassword(auth,email.value,password.value);
};

/* CHAT ID */

function chatId(u1,u2){
  return [u1,u2].sort().join("_");
}

/* LOAD USERS */

async function loadUsers(){
  const snap = await getDocs(collection(db,"users"));
  const box = document.getElementById("userList");
  box.innerHTML="";

  snap.forEach(d=>{
    if(d.id!==CURRENT_USER){
      const div=document.createElement("div");
      div.innerText=d.data().name;
      div.onclick=()=>createChat(d.id);
      box.appendChild(div);
    }
  });
}

/* NEW CHAT */

window.openNewChat=()=>{
  document.getElementById("modal").style.display="block";
  loadUsers();
};

async function createChat(userId){
  const id=chatId(CURRENT_USER,userId);

  await setDoc(doc(db,"chats",id),{
    participants:[CURRENT_USER,userId],
    lastMessage:"",
    timestamp:Date.now()
  },{merge:true});

  openChat(userId);
  document.getElementById("modal").style.display="none";
}

/* CHAT LIST */

function listenChats(){
  const q=query(collection(db,"chats"),
    where("participants","array-contains",CURRENT_USER),
    orderBy("timestamp","desc")
  );

  onSnapshot(q,snap=>{
    const list=document.getElementById("chatList");
    list.innerHTML="";

    snap.forEach(d=>{
      const data=d.data();
      const other=data.participants.find(p=>p!==CURRENT_USER);

      const div=document.createElement("div");
      div.className="chatItem";
      div.innerHTML=`<b>${other}</b><br>${data.lastMessage||""}`;
      div.onclick=()=>openChat(other);

      list.appendChild(div);
    });
  });
}

/* OPEN CHAT */

function openChat(userId){
  currentChatUser=userId;
  document.getElementById("chatHeader").innerText=userId;

  const id=chatId(CURRENT_USER,userId);

  if(unsubscribe) unsubscribe();

  const q=query(collection(db,"messages"),
    where("chatId","==",id),
    orderBy("time")
  );

  unsubscribe=onSnapshot(q,snap=>{
    const box=document.getElementById("messages");
    box.innerHTML="";

    snap.forEach(d=>{
      const m=d.data();
      const div=document.createElement("div");
      div.className="msg "+(m.sender===CURRENT_USER?"sent":"received");
      div.innerText=m.text;
      box.appendChild(div);
    });

    box.scrollTop=box.scrollHeight;
  });
}

/* SEND */

window.sendMessage=async ()=>{
  const text=msgInput.value;
  if(!text) return;

  const id=chatId(CURRENT_USER,currentChatUser);

  await addDoc(collection(db,"messages"),{
    chatId:id,
    sender:CURRENT_USER,
    text,
    participants:[CURRENT_USER,currentChatUser], // ✅ FIX
    time:Date.now()
  });

  await setDoc(doc(db,"chats",id),{
    participants:[CURRENT_USER,currentChatUser],
    lastMessage:text,
    timestamp:Date.now()
  },{merge:true});

  msgInput.value="";
};

/* INIT */

onAuthStateChanged(auth,user=>{
  if(user){
    CURRENT_USER=user.uid;
    authBox.style.display="none";
    container.style.display="flex";
    listenChats();
  }
});

</script>

</body>
</html>
