  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --brand: #0a7c5c;
      --brand-light: #e6f4f0;
      --brand-mid: #1aab80;
      --surface: #ffffff;
      --surface-2: #f7f8fa;
      --surface-3: #eef0f3;
      --border: rgba(0,0,0,0.07);
      --border-strong: rgba(0,0,0,0.13);
      --text-1: #0d1117;
      --text-2: #4b5563;
      --text-3: #9ca3af;
      --bubble-out: #0a7c5c;
      --bubble-out-text: #ffffff;
      --bubble-in: #ffffff;
      --bubble-in-text: #0d1117;
      --chat-bg: #f0f4f8;
      --unread: #ef4444;
      --radius-sm: 8px;
      --radius-md: 14px;
      --radius-lg: 20px;
      --radius-xl: 28px;
      --shadow-sm: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
      --shadow-md: 0 4px 16px rgba(0,0,0,0.08), 0 1px 4px rgba(0,0,0,0.04);
      --sidebar-w: 340px;
      --header-h: 64px;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--surface-2);
      color: var(--text-1);
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Auth Screen ── */
    #authBox {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: linear-gradient(135deg, #f0faf6 0%, #e8f4fe 100%);
    }

    .auth-card {
      width: 100%;
      max-width: 400px;
      background: var(--surface);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow-md);
      padding: 40px;
      border: 1px solid var(--border);
    }

    .auth-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 32px;
    }

    .auth-logo-mark {
      width: 40px;
      height: 40px;
      background: var(--brand);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .auth-logo-mark svg { color: white; }

    .auth-logo-text {
      font-size: 1.25rem;
      font-weight: 600;
      color: var(--text-1);
      letter-spacing: -0.02em;
    }

    .auth-title {
      font-size: 1.6rem;
      font-weight: 600;
      letter-spacing: -0.03em;
      color: var(--text-1);
      margin-bottom: 6px;
    }

    .auth-subtitle {
      font-size: 0.9rem;
      color: var(--text-2);
      margin-bottom: 28px;
    }

    .auth-field {
      margin-bottom: 14px;
    }

    .auth-field input {
      width: 100%;
      padding: 13px 16px;
      border: 1.5px solid var(--border-strong);
      border-radius: var(--radius-md);
      font-family: inherit;
      font-size: 0.95rem;
      color: var(--text-1);
      background: var(--surface);
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
    }

    .auth-field input:focus {
      border-color: var(--brand);
      box-shadow: 0 0 0 3px rgba(10,124,92,0.1);
    }

    .auth-field input::placeholder { color: var(--text-3); }

    .auth-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 20px;
    }

    .btn-primary {
      padding: 13px;
      background: var(--brand);
      color: #fff;
      border: none;
      border-radius: var(--radius-md);
      font-family: inherit;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
    }

    .btn-primary:hover { background: #086b4f; }
    .btn-primary:active { transform: scale(0.98); }

    .btn-secondary {
      padding: 13px;
      background: transparent;
      color: var(--brand);
      border: 1.5px solid var(--brand);
      border-radius: var(--radius-md);
      font-family: inherit;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }

    .btn-secondary:hover { background: var(--brand-light); }

    #authStatus {
      margin-top: 14px;
      font-size: 0.85rem;
      color: #dc2626;
      text-align: center;
      min-height: 20px;
    }

    /* ── Main Layout ── */
    #container {
      display: flex;
      height: 100vh;
      max-width: 1280px;
      margin: 0 auto;
      background: var(--surface);
    }

    /* ── Sidebar ── */
    .sidebar {
      width: var(--sidebar-w);
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      background: var(--surface);
      border-right: 1px solid var(--border);
      position: relative;
      z-index: 10;
    }

    .sidebar-header {
      padding: 20px 20px 14px;
      border-bottom: 1px solid var(--border);
    }

    .sidebar-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
    }

    .sidebar-title {
      font-size: 1.3rem;
      font-weight: 600;
      letter-spacing: -0.02em;
      color: var(--text-1);
    }

    .icon-btn {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      border: none;
      background: transparent;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-2);
      transition: background 0.15s, color 0.15s;
    }

    .icon-btn:hover { background: var(--surface-3); color: var(--text-1); }

    .search-wrap {
      position: relative;
      display: flex;
      align-items: center;
    }

    .search-wrap svg {
      position: absolute;
      left: 12px;
      color: var(--text-3);
      pointer-events: none;
    }

    .search-input {
      width: 100%;
      padding: 10px 12px 10px 38px;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      font-family: inherit;
      font-size: 0.88rem;
      color: var(--text-1);
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
    }

    .search-input:focus {
      border-color: var(--brand);
      box-shadow: 0 0 0 3px rgba(10,124,92,0.08);
      background: var(--surface);
    }

    .search-input::placeholder { color: var(--text-3); }

    #left { flex: 1; overflow-y: auto; }
    #left::-webkit-scrollbar { width: 4px; }
    #left::-webkit-scrollbar-track { background: transparent; }
    #left::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 4px; }

    .chat-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 20px;
      cursor: pointer;
      transition: background 0.12s;
      position: relative;
      border-bottom: 1px solid var(--border);
    }

    .chat-item:last-child { border-bottom: none; }
    .chat-item:hover { background: var(--surface-2); }
    .chat-item.active { background: var(--brand-light); }

    .chat-item.active::before {
      content: '';
      position: absolute;
      left: 0;
      top: 8px;
      bottom: 8px;
      width: 3px;
      background: var(--brand);
      border-radius: 0 3px 3px 0;
    }

    .avatar {
      width: 46px;
      height: 46px;
      border-radius: 50%;
      background: var(--brand-light);
      color: var(--brand);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 600;
      font-size: 1.05rem;
      flex-shrink: 0;
      letter-spacing: -0.01em;
    }

    .avatar.lg {
      width: 42px;
      height: 42px;
      font-size: 1rem;
    }

    .chat-meta { flex: 1; min-width: 0; }

    .chat-name {
      font-size: 0.93rem;
      font-weight: 500;
      color: var(--text-1);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .chat-item.unread .chat-name { font-weight: 700; }

    .chat-preview {
      font-size: 0.82rem;
      color: var(--text-3);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-top: 2px;
    }

    .chat-item.unread .chat-preview { color: var(--text-2); font-weight: 500; }

    .chat-right {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 6px;
      flex-shrink: 0;
    }

    .unread-dot {
      min-width: 20px;
      height: 20px;
      padding: 0 5px;
      background: var(--brand);
      color: #fff;
      font-size: 0.72rem;
      font-weight: 700;
      border-radius: 999px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .chat-opts-wrap { position: relative; }

    .chat-opts-btn {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      border: none;
      background: transparent;
      color: var(--text-3);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.1rem;
      transition: background 0.12s, color 0.12s;
    }

    .chat-opts-btn:hover { background: var(--surface-3); color: var(--text-1); }

    .chat-opts-menu {
      position: absolute;
      right: 0;
      top: 32px;
      min-width: 160px;
      background: var(--surface);
      border: 1px solid var(--border-strong);
      border-radius: var(--radius-md);
      box-shadow: var(--shadow-md);
      z-index: 80;
      overflow: hidden;
    }

    .chat-opts-menu.hidden { display: none; }

    .chat-opts-menu button {
      display: block;
      width: 100%;
      padding: 10px 14px;
      text-align: left;
      font-size: 0.87rem;
      font-family: inherit;
      color: var(--text-1);
      background: none;
      border: none;
      cursor: pointer;
      transition: background 0.1s;
    }

    .chat-opts-menu button:hover { background: var(--surface-2); }
    .chat-opts-menu button.danger { color: #dc2626; }

    /* ── New Chat Side Panel ── */
    .side-panel {
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: var(--surface);
      z-index: 50;
      transition: left 0.28s cubic-bezier(0.2,0,0,1);
      display: flex;
      flex-direction: column;
    }

    .side-panel.active { left: 0; }

    .panel-header {
      background: var(--brand);
      color: #fff;
      padding: 20px;
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .panel-header h3 { font-size: 1.1rem; font-weight: 600; }
    .panel-header p { font-size: 0.8rem; opacity: 0.8; margin-top: 2px; }

    .panel-search {
      padding: 12px 16px;
      background: var(--surface-2);
      border-bottom: 1px solid var(--border);
    }

    #newChatUsers { overflow-y: auto; flex: 1; }

    .contact-item {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 12px 20px;
      cursor: pointer;
      transition: background 0.12s;
      border-bottom: 1px solid var(--border);
    }

    .contact-item:hover { background: var(--surface-2); }

    .contact-name { font-size: 0.9rem; font-weight: 500; color: var(--text-1); }
    .contact-email { font-size: 0.8rem; color: var(--text-3); margin-top: 2px; }

    /* ── Chat Area ── */
    #right {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: var(--chat-bg);
      position: relative;
      overflow: hidden;
    }

    #chatHeader {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 20px;
      min-height: 64px;
      display: flex;
      align-items: center;
      gap: 14px;
      z-index: 5;
      box-shadow: var(--shadow-sm);
    }

    .header-info { flex: 1; }
    .header-name { font-size: 0.98rem; font-weight: 600; color: var(--text-1); }
    .header-status { font-size: 0.78rem; color: var(--brand); margin-top: 1px; }

    #messages {
      flex: 1;
      padding: 24px 20px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 2px;
      scroll-behavior: smooth;
    }

    #messages::-webkit-scrollbar { width: 4px; }
    #messages::-webkit-scrollbar-track { background: transparent; }
    #messages::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.12); border-radius: 4px; }

    .msg-wrapper {
      display: flex;
      width: 100%;
      margin-bottom: 1px;
    }

    .msg-wrapper.sent { justify-content: flex-end; }
    .msg-wrapper.received { justify-content: flex-start; }

    .msg {
      max-width: 62%;
      padding: 10px 14px;
      font-size: 0.9rem;
      line-height: 1.5;
      border-radius: var(--radius-lg);
      word-break: break-word;
      position: relative;
      animation: msgIn 0.18s ease-out;
    }

    @keyframes msgIn {
      from { opacity: 0; transform: translateY(6px) scale(0.97); }
      to { opacity: 1; transform: none; }
    }

    .msg.sent {
      background: var(--bubble-out);
      color: var(--bubble-out-text);
      border-bottom-right-radius: 4px;
    }

    .msg.received {
      background: var(--bubble-in);
      color: var(--bubble-in-text);
      border-bottom-left-radius: 4px;
      box-shadow: var(--shadow-sm);
    }

    /* ── Input Box ── */
    #inputBox {
      display: none;
      align-items: center;
      gap: 10px;
      padding: 12px 16px;
      background: var(--surface);
      border-top: 1px solid var(--border);
    }

    #msgInput {
      flex: 1;
      padding: 12px 16px;
      background: var(--surface-2);
      border: 1.5px solid var(--border);
      border-radius: var(--radius-xl);
      font-family: inherit;
      font-size: 0.93rem;
      color: var(--text-1);
      outline: none;
      transition: border-color 0.15s, background 0.15s;
      resize: none;
      max-height: 120px;
    }

    #msgInput:focus {
      border-color: var(--brand);
      background: var(--surface);
    }

    #msgInput::placeholder { color: var(--text-3); }

    .input-action-btn {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      border: none;
      background: var(--surface-2);
      color: var(--text-2);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s, color 0.15s;
      flex-shrink: 0;
    }

    .input-action-btn:hover { background: var(--surface-3); color: var(--text-1); }

    #sendBtn {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      border: none;
      background: var(--brand);
      color: #fff;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.15s, transform 0.1s;
    }

    #sendBtn:hover { background: #086b4f; }
    #sendBtn:active { transform: scale(0.93); }

    /* ── Empty State ── */
    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      text-align: center;
      padding: 40px;
      color: var(--text-3);
    }

    .empty-icon {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: var(--brand-light);
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 20px;
    }

    .empty-icon svg { color: var(--brand); }
    .empty-title { font-size: 1.2rem; font-weight: 500; color: var(--text-2); margin-bottom: 6px; }
    .empty-sub { font-size: 0.87rem; color: var(--text-3); max-width: 240px; line-height: 1.6; }

    .encrypted-notice {
      font-size: 0.78rem;
      color: var(--text-3);
      background: rgba(255,255,255,0.7);
      padding: 6px 14px;
      border-radius: 999px;
      margin: 0 auto 16px;
      display: inline-block;
      backdrop-filter: blur(6px);
    }

    /* ── Contact Modal ── */
    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(15,23,42,0.4);
      z-index: 200;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 20px;
      backdrop-filter: blur(4px);
    }

    .modal-backdrop.active { display: flex; }

    .modal {
      width: 100%;
      max-width: 360px;
      background: var(--surface);
      border-radius: var(--radius-xl);
      box-shadow: 0 24px 60px rgba(0,0,0,0.18);
      overflow: hidden;
      animation: modalIn 0.2s ease-out;
    }

    @keyframes modalIn {
      from { opacity: 0; transform: scale(0.95) translateY(8px); }
      to { opacity: 1; transform: none; }
    }

    .modal-header {
      padding: 20px 20px 16px;
      background: var(--brand);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .modal-header h3 { font-size: 1rem; font-weight: 600; }

    .modal-close {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      border: none;
      background: rgba(255,255,255,0.15);
      color: #fff;
      cursor: pointer;
      font-size: 1.2rem;
      display: flex;
      align-items: center;
      justify-content: center;
      line-height: 1;
      transition: background 0.12s;
    }

    .modal-close:hover { background: rgba(255,255,255,0.25); }

    .modal-body {
      padding: 28px;
      text-align: center;
    }

    .modal-avatar {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      background: var(--brand-light);
      color: var(--brand);
      font-size: 1.6rem;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 16px;
    }

    .modal-name { font-size: 1.15rem; font-weight: 600; color: var(--text-1); }
    .modal-email { font-size: 0.85rem; color: var(--text-3); margin-top: 4px; word-break: break-all; }

    /* ── Mobile ── */
    #mobileBackBtn { display: none; }

    @media (max-width: 768px) {
      #container { height: 100dvh; }

      .sidebar { width: 100%; }

      #right {
        position: absolute;
        inset: 0;
        transform: translateX(100%);
        transition: transform 0.28s cubic-bezier(0.2,0,0,1);
        z-index: 20;
      }

      #container.mobile-chat-open #right {
        transform: translateX(0);
      }

      #mobileBackBtn { display: flex; }

      .msg { max-width: 78%; }
    }

    /* ── Empty chat list ── */
    .no-chats {
      padding: 48px 24px;
      text-align: center;
      color: var(--text-3);
      font-size: 0.87rem;
    }

    .no-chats svg { margin-bottom: 12px; color: var(--brand); opacity: 0.4; }
  </style>
</head>

<div id="navbar"></div>
<script src="public/js/navbar-loader.js"></script>
<script>window.loadBooterNavbar && window.loadBooterNavbar();</script>

<!-- ── Auth Screen ── -->
<div id="authBox">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="auth-logo-mark">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
        </svg>
      </div>
      <span class="auth-logo-text">BooterSpace</span>
    </div>
    <h2 class="auth-title">Welcome back</h2>
    <p class="auth-subtitle">Sign in to continue your conversations</p>
    <div class="auth-field">
      <input id="email" type="email" placeholder="Email address" autocomplete="email">
    </div>
    <div class="auth-field">
      <input id="password" type="password" placeholder="Password" autocomplete="current-password">

</div>

<script type="module">
import { initializeApp, getApp, getApps } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
import { 
  getFirestore, collection, addDoc, getDocs, getDoc,
  query, where, orderBy, onSnapshot, doc, setDoc, serverTimestamp, limit, increment
} from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";
import { 
  getAuth, createUserWithEmailAndPassword, 
  signInWithEmailAndPassword, onAuthStateChanged, signOut, signInWithCustomToken
} from "https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js";

function getEnvVar(...keys) {
  const runtimeEnv = window.__ENV__ || {};
  for (const key of keys) { if (runtimeEnv[key]) return runtimeEnv[key]; }
  return "";
}

const firebaseConfig = {
  apiKey: getEnvVar("VITE_FIREBASE_API_KEY","NEXT_PUBLIC_FIREBASE_API_KEY","REACT_APP_FIREBASE_API_KEY"),
  authDomain: getEnvVar("VITE_FIREBASE_AUTH_DOMAIN","NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN","REACT_APP_FIREBASE_AUTH_DOMAIN"),
  databaseURL: getEnvVar("VITE_FIREBASE_DATABASE_URL","NEXT_PUBLIC_FIREBASE_DATABASE_URL","REACT_APP_FIREBASE_DATABASE_URL"),
  projectId: getEnvVar("VITE_FIREBASE_PROJECT_ID","NEXT_PUBLIC_FIREBASE_PROJECT_ID","REACT_APP_FIREBASE_PROJECT_ID"),
  storageBucket: getEnvVar("VITE_FIREBASE_STORAGE_BUCKET","NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET","REACT_APP_FIREBASE_STORAGE_BUCKET"),
  messagingSenderId: getEnvVar("VITE_FIREBASE_MESSAGING_SENDER_ID","NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID","REACT_APP_FIREBASE_MESSAGING_SENDER_ID"),
  appId: getEnvVar("VITE_FIREBASE_APP_ID","NEXT_PUBLIC_FIREBASE_APP_ID","REACT_APP_FIREBASE_APP_ID"),
  measurementId: getEnvVar("VITE_FIREBASE_MEASUREMENT_ID","NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID","REACT_APP_FIREBASE_MEASUREMENT_ID")
};

const app = getApps().length ? getApp() : initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

let CURRENT_USER = null;
let currentChatUser = null;
let currentChatId = null;
let unsubscribeMessages = null;
let unsubscribeChats = null;
let hasAutoOpenedLatestChat = false;
const pendingOpenChatId = new URLSearchParams(window.location.search).get("chatId");
const pendingComposeTo = new URLSearchParams(window.location.search).get("composeTo");
let allUsers = [];
let activeChats = [];

const left = document.getElementById("left");
const userSearch = document.getElementById("userSearch");
const newChatSearch = document.getElementById("newChatSearch");
const messagesBox = document.getElementById("messages");
const newChatBtn = document.getElementById("newChatBtn");
const sidePanel = document.getElementById("sidePanel");
const closeSidePanel = document.getElementById("closeSidePanel");
const newChatUsers = document.getElementById("newChatUsers");
const contactCount = document.getElementById("contactCount");
const inputBox = document.getElementById("inputBox");
const container = document.getElementById("container");
const mobileBackBtn = document.getElementById("mobileBackBtn");
const contactModalBackdrop = document.getElementById("contactModalBackdrop");
const closeContactModal = document.getElementById("closeContactModal");

function showChatError(message) {
  messagesBox.innerHTML = `<div style="margin:auto;text-align:center;font-size:.9rem;color:#dc2626;padding:24px">${message}</div>`;
}

function escapeHtml(value = "") {
  return value.toString().replace(/[&<>'"]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;","'":"&#39;",'"':"&quot;"}[c]));
}

function getMapValueForUser(mapValue, userId) {
  if (!mapValue || typeof mapValue !== "object" || !userId) return undefined;
  if (Object.prototype.hasOwnProperty.call(mapValue, userId)) return mapValue[userId];
  return userId.split(".").reduce((v, seg) => (!v || typeof v !== "object") ? undefined : v[seg], mapValue);
}

function getUnreadCount(chat) {
  if (!chat || !CURRENT_USER) return 0;
  const v = getMapValueForUser(chat.unreadBy, CURRENT_USER);
  if (v !== undefined) return Number(v) || 0;
  if (chat.unreadBy?.typeof === "object" && chat.unreadBy[CURRENT_USER] !== undefined) return Number(chat.unreadBy[CURRENT_USER]) || 0;
  return 0;
}

function isChatDeletedForCurrentUser(chat) {
  return getMapValueForUser(chat?.deletedFor, CURRENT_USER) === true;
}

function formatUnreadCount(count) { return count > 99 ? "99+" : String(count); }

function closeAllChatMenus() {
  document.querySelectorAll(".chat-opts-menu").forEach(m => m.classList.add("hidden"));
}

function isMobileView() { return window.matchMedia("(max-width: 768px)").matches; }

function setMobileChatOpen(open) {
  if (!container) return;
  container.classList.toggle("mobile-chat-open", open && isMobileView());
}

function togglePanel(show) {
  if (show) { sidePanel.classList.add("active"); newChatSearch.focus(); }
  else { sidePanel.classList.remove("active"); }
}

newChatBtn.onclick = () => { newChatSearch.value = ""; renderNewChatUsers(""); togglePanel(true); };
closeSidePanel.onclick = () => togglePanel(false);
mobileBackBtn.onclick = () => setMobileChatOpen(false);
closeContactModal.onclick = () => contactModalBackdrop.classList.remove("active");
contactModalBackdrop.onclick = e => { if (e.target === contactModalBackdrop) contactModalBackdrop.classList.remove("active"); };
document.addEventListener("click", e => { if (e.target instanceof Element && !e.target.closest(".chat-opts-wrap")) closeAllChatMenus(); });

window.signup = async () => {
  try {
    setAuthStatus("");
    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value;
    if (!email || !password) return setAuthStatus("Email and password are required.");
    const userCred = await createUserWithEmailAndPassword(auth, email, password);
    await setDoc(doc(db, "users", userCred.user.uid), { name: email.split("@")[0], email, uid: userCred.user.uid, createdAt: Date.now() });
  } catch (error) { setAuthStatus(error.message); }
};

window.login = async () => {
  try {
    setAuthStatus("");
    await signInWithEmailAndPassword(auth, document.getElementById("email").value.trim(), document.getElementById("password").value);
  } catch (error) { setAuthStatus(error.message); }
};

window.bindChatLogout = function bindLogout() {
  const logoutBtn = document.getElementById("logoutBtn");
  const mobileLogoutBtn = document.getElementById("mLogoutBtn");
  if (logoutBtn) logoutBtn.onclick = () => signOut(auth);
  if (mobileLogoutBtn) mobileLogoutBtn.onclick = () => signOut(auth);
};

function setAuthStatus(text) { document.getElementById("authStatus").textContent = text; }
function getChatId(u1, u2) { return [u1, u2].sort().join("_"); }
function safeNameFromUser(userDoc, fallbackId) { return userDoc?.name || userDoc?.email || fallbackId || "Unknown User"; }
function getPartnerIdFromChat(chat) { return (chat.participants || []).find(p => p !== CURRENT_USER) || null; }

async function loadAllUsers() {
  if (!CURRENT_USER) return;
  const snap = await getDocs(query(collection(db, "users"), limit(500)));
  allUsers = snap.docs.map(d => ({ id: d.id, name: safeNameFromUser(d.data(), d.id), email: d.data()?.email || "" }));
  contactCount.textContent = `${allUsers.length - 1} contacts`;
  renderNewChatUsers("");
}

function listenToChats() {
  if (!CURRENT_USER) return;
  if (unsubscribeChats) unsubscribeChats();
  const q = query(collection(db, "chats"), where("participants", "array-contains", CURRENT_USER), orderBy("timestamp", "desc"));
  unsubscribeChats = onSnapshot(q, snapshot => {
    activeChats = snapshot.docs.map(d => ({ chatId: d.id, ...d.data() }));
    renderChatList();
    if (!hasAutoOpenedLatestChat && (pendingOpenChatId || pendingComposeTo)) {
      const requestedChat = pendingOpenChatId ? activeChats.find(c => c.chatId === pendingOpenChatId) : null;
      const requestedCompose = pendingComposeTo ? { participants: [CURRENT_USER, pendingComposeTo] } : null;
      const targetChat = requestedChat || requestedCompose;
      const partnerId = getPartnerIdFromChat(targetChat || {});
      if (partnerId) {
        const partner = allUsers.find(u => u.id === partnerId);
        hasAutoOpenedLatestChat = true;
        openChat(partnerId, partner?.name || partnerId || "User");
      }
    }
  }, err => console.error("Chat list error:", err));
}

function renderChatList(filter = "") {
  left.innerHTML = "";
  const term = filter.toLowerCase();
  const visible = activeChats.filter(c => !isChatDeletedForCurrentUser(c));
  const filtered = visible.filter(chat => {
    const pId = getPartnerIdFromChat(chat);
    const partner = allUsers.find(u => u.id === pId);
    const name = (partner?.name || pId || "").toLowerCase();
    const preview = (chat.lastMessage || "").toLowerCase();
    return name.includes(term) || preview.includes(term);
  });

  if (filtered.length === 0) {
    left.innerHTML = `<div class="no-chats"><svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg><br>No conversations yet.<br>Start one with the button above.</div>`;
    return;
  }

  filtered.forEach(chat => {
    const pId = getPartnerIdFromChat(chat);
    const partner = allUsers.find(u => u.id === pId);
    const displayName = partner?.name || "User";
    const initials = displayName[0].toUpperCase();
    const unreadCount = getUnreadCount(chat);
    const unreadText = formatUnreadCount(unreadCount);

    const div = document.createElement("div");
    div.className = `chat-item ${chat.chatId === currentChatId ? "active" : ""} ${unreadCount > 0 ? "unread" : ""}`;

    div.innerHTML = `
      <div class="avatar">${escapeHtml(initials)}</div>
      <div class="chat-meta">
        <div class="chat-name">${escapeHtml(displayName)}</div>
        <div class="chat-preview">${escapeHtml(chat.lastMessage || "…")}</div>
      </div>
      <div class="chat-right">
        ${unreadCount > 0 ? `<span class="unread-dot" aria-label="${unreadCount} unread">${escapeHtml(unreadText)}</span>` : ""}
        <div class="chat-opts-wrap">
          <button class="chat-opts-btn" type="button" aria-label="Options">⋯</button>
          <div class="chat-opts-menu hidden">
            <button type="button" data-action="view-contact">View contact</button>
            <button type="button" data-action="delete-chat" class="danger">Delete chat</button>
          </div>
        </div>
      </div>
    `;

    div.addEventListener("click", () => openChat(pId, displayName));
    div.querySelector(".chat-opts-btn").addEventListener("click", e => {
      e.stopPropagation();
      const menu = div.querySelector(".chat-opts-menu");
      const shouldOpen = menu.classList.contains("hidden");
      closeAllChatMenus();
      menu.classList.toggle("hidden", !shouldOpen);
    });
    div.querySelector('[data-action="view-contact"]').addEventListener("click", e => {
      e.stopPropagation();
      closeAllChatMenus();
      showContactInfo(partner || { id: pId, name: displayName, email: "" });
    });
    div.querySelector('[data-action="delete-chat"]').addEventListener("click", async e => {
      e.stopPropagation();
      closeAllChatMenus();
      await deleteChat(chat.chatId);
    });
    left.appendChild(div);
  });
}

function showContactInfo(user) {
  document.getElementById("contactModalAvatar").textContent = (user.name || "U").charAt(0).toUpperCase();
  document.getElementById("contactModalName").textContent = user.name || "User";
  document.getElementById("contactModalEmail").textContent = user.email || "No email available";
  contactModalBackdrop.classList.add("active");
}

async function deleteChat(chatId) {
  if (!chatId || !CURRENT_USER) return;
  if (!window.confirm("Delete this conversation from your chat list?")) return;
  try {
    await setDoc(doc(db, "chats", chatId), { deletedFor: { [CURRENT_USER]: true } }, { merge: true });
    activeChats = activeChats.filter(c => c.chatId !== chatId);
    if (chatId === currentChatId) {
      currentChatId = null;
      currentChatUser = null;
      if (unsubscribeMessages) { unsubscribeMessages(); unsubscribeMessages = null; }
      inputBox.style.display = "none";
      messagesBox.innerHTML = `<div class="empty-state"><div class="empty-icon"><svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg></div><p class="empty-title">Conversation deleted</p></div>`;
      setMobileChatOpen(false);
    }
    renderChatList();
  } catch (err) {
    console.error("Delete chat error:", err);
    showChatError("Could not delete conversation.");
  }
}

function renderNewChatUsers(filter = "") {
  newChatUsers.innerHTML = "";
  const term = filter.trim().toLowerCase();
  const candidates = allUsers.filter(u => u.id !== CURRENT_USER && (u.name?.toLowerCase().includes(term) || u.email?.toLowerCase().includes(term)));
  if (candidates.length === 0) {
    newChatUsers.innerHTML = `<div style="padding:40px 20px;text-align:center;color:var(--text-3);font-size:.87rem;">No results for "${escapeHtml(filter)}"</div>`;
    return;
  }
  candidates.forEach(user => {
    const div = document.createElement("div");
    div.className = "contact-item";
    const initials = (user.name || "U")[0].toUpperCase();
    div.innerHTML = `
      <div class="avatar lg">${escapeHtml(initials)}</div>
      <div>
        <div class="contact-name">${escapeHtml(user.name || "User")}</div>
        <div class="contact-email">${escapeHtml(user.email)}</div>
      </div>
    `;
    div.onclick = async () => {
      try { await createOrOpenChat(user.id, user.name); togglePanel(false); }
      catch (err) { console.error("Create/open chat error:", err); showChatError("Could not open chat. Please try again."); }
    };
    newChatUsers.appendChild(div);
  });
}

window.openChat = async (partnerId, partnerName) => {
  currentChatUser = partnerId;
  currentChatId = getChatId(CURRENT_USER, partnerId);
  const safeName = partnerName || "User";
  const initials = safeName.charAt(0).toUpperCase();

  await setDoc(doc(db, "chats", currentChatId), {
    unreadBy: { [CURRENT_USER]: 0 },
    deletedFor: { [CURRENT_USER]: false }
  }, { merge: true });

  document.getElementById("chatHeader").innerHTML = `
    <button id="mobileBackBtn" class="icon-btn" aria-label="Back to chats">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
    </button>
    <div class="avatar">${escapeHtml(initials)}</div>
    <div class="header-info">
      <div class="header-name">${escapeHtml(safeName)}</div>
      <div class="header-status">● Active now</div>
    </div>
  `;
  document.getElementById("mobileBackBtn")?.addEventListener("click", () => setMobileChatOpen(false));

  messagesBox.innerHTML = `<div style="margin:auto;color:var(--text-3);font-size:.85rem;">Loading…</div>`;
  inputBox.style.display = "flex";

  if (unsubscribeMessages) unsubscribeMessages();
  const q = query(collection(db, "messages"), where("chatId", "==", currentChatId), orderBy("time", "asc"));
  unsubscribeMessages = onSnapshot(q, snapshot => {
    messagesBox.innerHTML = "";
    if (snapshot.empty) {
      messagesBox.innerHTML = `<div style="text-align:center;margin-top:auto;padding-bottom:16px"><span class="encrypted-notice">🔒 Messages are end-to-end encrypted</span></div>`;
    } else {
      snapshot.forEach(docSnap => {
        const m = docSnap.data();
        const wrapper = document.createElement("div");
        const isSender = m.sender === CURRENT_USER;
        wrapper.className = `msg-wrapper ${isSender ? "sent" : "received"}`;
        const div = document.createElement("div");
        div.className = `msg ${isSender ? "sent" : "received"}`;
        div.textContent = m.text;
        wrapper.appendChild(div);
        messagesBox.appendChild(wrapper);
      });
      messagesBox.scrollTop = messagesBox.scrollHeight;
    }
  }, err => {
    console.error("Messages error:", err);
    showChatError("Could not load messages. Check your Firestore index/rules.");
  });

  setMobileChatOpen(true);
  renderChatList();
};

async function createOrOpenChat(partnerId, partnerName) {
  if (!CURRENT_USER || !partnerId) return;
  try {
    const chatId = getChatId(CURRENT_USER, partnerId);
    const chatRef = doc(db, "chats", chatId);
    const existing = await getDoc(chatRef);
    if (!existing.exists()) {
      await setDoc(chatRef, { participants: [CURRENT_USER, partnerId], lastMessage: "", timestamp: serverTimestamp() }, { merge: true });
    }
    await openChat(partnerId, partnerName || "User");
  } catch (err) { console.error("createOrOpenChat failed:", err); throw err; }
}

window.sendMessage = async () => {
  const input = document.getElementById("msgInput");
  const text = input.value.trim();
  if (!text || !currentChatId) return;
  input.value = "";
  if (isMobileView()) input.focus();
  try {
    await addDoc(collection(db, "messages"), {
      chatId: currentChatId,
      sender: CURRENT_USER,
      receiver: currentChatUser,
      text,
      time: serverTimestamp()
    });
    await setDoc(doc(db, "chats", currentChatId), {
      participants: [CURRENT_USER, currentChatUser],
      lastMessage: text,
      lastSenderId: CURRENT_USER,
      timestamp: serverTimestamp(),
      unreadBy: { [currentChatUser]: increment(1), [CURRENT_USER]: 0 },
      deletedFor: { [CURRENT_USER]: false, [currentChatUser]: false }
    }, { merge: true });
    if (isMobileView()) input.focus();
  } catch (err) { console.error("Send error:", err); }
};

userSearch.oninput = e => renderChatList(e.target.value);
newChatSearch.oninput = e => renderNewChatUsers(e.target.value);
document.getElementById("msgInput").onkeydown = e => { if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendMessage(); } };

const sendBtn = document.getElementById("sendBtn");
sendBtn?.addEventListener("pointerdown", e => e.preventDefault());

const emptyState = `
  <div class="empty-state">
    <div class="empty-icon">
      <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
    </div>
    <p class="empty-title">BooterSpace Messages</p>
    <p class="empty-sub">Connect with recruiters, employers, and peers</p>
  </div>
`;

onAuthStateChanged(auth, async user => {
  if (user) {
    CURRENT_USER = user.uid;
    hasAutoOpenedLatestChat = false;
    document.getElementById("authBox").style.display = "none";
    document.getElementById("container").style.display = "flex";
    document.getElementById("logoutBtn")?.classList.remove("hidden");
    await loadAllUsers();
    listenToChats();
  } else {
    CURRENT_USER = null;
    if (unsubscribeMessages) { unsubscribeMessages(); unsubscribeMessages = null; }
    if (unsubscribeChats) { unsubscribeChats(); unsubscribeChats = null; }
    activeChats = []; allUsers = [];
    currentChatUser = null; currentChatId = null;
    hasAutoOpenedLatestChat = false;
    messagesBox.innerHTML = emptyState;
    inputBox.style.display = "none";
    renderChatList();
    document.getElementById("authBox").style.display = "flex";
    document.getElementById("container").style.display = "none";
    document.getElementById("logoutBtn")?.classList.add("hidden");
  }
});

const initAuth = async () => {
  if (typeof __initial_auth_token !== "undefined" && __initial_auth_token) {
    await signInWithCustomToken(auth, __initial_auth_token).catch(() => null);
  }
};
window.bindChatLogout();
initAuth();

window.addEventListener("resize", () => { if (!isMobileView()) setMobileChatOpen(false); });
