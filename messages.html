<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Messages - BooterSpace</title>
  <link rel="stylesheet" href="assets/css/shared.css">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="icon" href="/favicon.ico" type="image/x-icon">
  <script src="public/js/env-config.js"></script>

  <style>
    body { margin: 0; font-family: Arial, sans-serif; background: #f3f2ef; }

    .messages-layout {
      display: flex;
      height: calc(100vh - 80px);
      min-height: 560px;
    }

    .chat-list {
      width: 32%;
      background: #fff;
      border-right: 1px solid #ddd;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
    }

    .chat-list-header {
      padding: 14px;
      border-bottom: 1px solid #eee;
      position: sticky;
      top: 0;
      background: #fff;
      z-index: 2;
    }

    #userSearch {
      width: 100%;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      padding: 10px;
      font-size: 14px;
      outline: none;
    }

    #userSearch:focus {
      border-color: #0a66c2;
      box-shadow: 0 0 0 2px rgba(10, 102, 194, 0.15);
    }

    #left {
      overflow-y: auto;
      flex: 1;
    }

    .chatItem {
      padding: 14px;
      border-bottom: 1px solid #f0f0f0;
      cursor: pointer;
    }

    .chatItem:hover,
    .chatItem.active {
      background: #eef5ff;
    }

    .name { font-weight: bold; }
    .lastMsg { font-size: 12px; color: #6b7280; }

    #right {
      width: 68%;
      display: flex;
      flex-direction: column;
      background: #fff;
    }

    #chatHeader {
      padding: 15px;
      border-bottom: 1px solid #ddd;
      font-weight: bold;
      background: #fff;
    }

    #messages {
      flex: 1;
      padding: 15px;
      overflow-y: auto;
      background: #fafafa;
    }

    .msg {
      margin: 10px 0;
      padding: 10px;
      border-radius: 10px;
      max-width: 68%;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .sent { background: #0a66c2; color: white; margin-left: auto; }
    .received { background: #e4e6eb; }

    #inputBox {
      display: flex;
      padding: 10px;
      background: #fff;
      border-top: 1px solid #ddd;
      gap: 10px;
    }

    #msgInput {
      flex: 1;
      padding: 10px;
      border: 1px solid #d1d5db;
      border-radius: 8px;
    }

    #inputBox button {
      padding: 10px 16px;
      background: #0a66c2;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }

    #authBox {
      max-width: 360px;
      margin: 40px auto;
      background: #fff;
      padding: 20px;
      border: 1px solid #ddd;
      border-radius: 12px;
      box-shadow: 0 8px 26px rgba(0, 0, 0, 0.08);
    }

    #authBox input {
      width: 100%;
      padding: 10px;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      margin-bottom: 10px;
    }

    #authBox button {
      padding: 10px 14px;
      border: none;
      border-radius: 8px;
      margin-right: 8px;
      cursor: pointer;
    }

    #authStatus {
      margin-top: 10px;
      color: #b91c1c;
      font-size: 13px;
      min-height: 18px;
    }

    #emptyUsers,
    #emptyMessages {
      color: #6b7280;
      font-size: 14px;
      padding: 18px;
    }

    @media (max-width: 900px) {
      .messages-layout {
        flex-direction: column;
        height: auto;
      }

      .chat-list,
      #right {
        width: 100%;
      }

      .chat-list {
        max-height: 280px;
      }
    }
  </style>
</head>
<body>

<div id="navbar"></div>
<script>
fetch("navbar.html").then(r=>r.text()).then(html=>{
  document.getElementById("navbar").innerHTML = html;
  const s = document.createElement("script");
  s.type = "module";
  s.src = "/booterspace/public/js/navbar.js";
  document.body.appendChild(s);
});
</script>

<div id="authBox">
  <h3 class="text-lg font-bold mb-3">Login / Signup</h3>
  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">
  <div>
    <button style="background:#16a34a;color:#fff" onclick="signup()">Signup</button>
    <button style="background:#0a66c2;color:#fff" onclick="login()">Login</button>
  </div>
  <p id="authStatus"></p>
</div>

<div id="container" class="messages-layout" style="display:none">
  <aside class="chat-list">
    <div class="chat-list-header">
      <input id="userSearch" type="text" placeholder="Search users to start chat..." aria-label="Search users">
    </div>
    <div id="left"></div>
  </aside>

  <section id="right">
    <div id="chatHeader">Select a user to chat</div>
    <div id="messages">
      <p id="emptyMessages">No messages yet. Select a user and send the first message.</p>
    </div>

    <div id="inputBox">
      <input id="msgInput" placeholder="Type message...">
      <button onclick="sendMessage()">Send</button>
    </div>
  </section>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
  getFirestore, collection, addDoc, getDocs,
  query, where, orderBy, onSnapshot, doc, setDoc
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
import {
  getAuth, createUserWithEmailAndPassword,
  signInWithEmailAndPassword, onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyBeGZBE1u1-y1hDWbRouchgwkgp89D973I",
  authDomain: "kar-kardan.firebaseapp.com",
  projectId: "kar-kardan"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

let CURRENT_USER = null;
let currentChatUser = null;
let unsubscribe = null;
let users = [];

const left = document.getElementById("left");
const userSearch = document.getElementById("userSearch");

window.signup = async () => {
  try {
    setAuthStatus("");
    const email = emailInput();
    const password = passInput();
    if (!email || !password) {
      setAuthStatus("Email and password are required.");
      return;
    }

    const userCred = await createUserWithEmailAndPassword(auth, email, password);
    await setDoc(doc(db, "users", userCred.user.uid), {
      name: email,
      email,
      createdAt: Date.now()
    });
  } catch (error) {
    setAuthStatus(error?.message || "Signup failed.");
  }
};

window.login = async () => {
  try {
    setAuthStatus("");
    await signInWithEmailAndPassword(auth, emailInput(), passInput());
  } catch (error) {
    setAuthStatus(error?.message || "Login failed.");
  }
};

function setAuthStatus(text) {
  document.getElementById("authStatus").textContent = text;
}

function emailInput() { return document.getElementById("email").value.trim(); }
function passInput() { return document.getElementById("password").value; }

onAuthStateChanged(auth, async (user) => {
  if (user) {
    CURRENT_USER = user.uid;
    document.getElementById("authBox").style.display = "none";
    document.getElementById("container").style.display = "flex";
    await loadUsers();
  } else {
    CURRENT_USER = null;
    document.getElementById("authBox").style.display = "block";
    document.getElementById("container").style.display = "none";
  }
});

async function loadUsers() {
  const snapshot = await getDocs(collection(db, "users"));
  users = [];

  snapshot.forEach((docSnap) => {
    if (docSnap.id !== CURRENT_USER) {
      const data = docSnap.data();
      users.push({ id: docSnap.id, name: data.name || data.email || "Unknown User" });
    }
  });

  renderUsers(users);
}

function renderUsers(list) {
  left.innerHTML = "";

  if (!list.length) {
    left.innerHTML = '<p id="emptyUsers">No users found.</p>';
    return;
  }

  list.forEach((user) => {
    const div = document.createElement("div");
    div.className = "chatItem" + (user.id === currentChatUser ? " active" : "");
    div.innerHTML = `
      <div class="name">${user.name}</div>
      <div class="lastMsg">Start chatting...</div>
    `;
    div.onclick = () => openChat(user.id, user.name);
    left.appendChild(div);
  });
}

userSearch.addEventListener("input", () => {
  const term = userSearch.value.trim().toLowerCase();
  if (!term) {
    renderUsers(users);
    return;
  }

  const filtered = users.filter((u) => u.name.toLowerCase().includes(term));
  renderUsers(filtered);
});

function getChatId(u1, u2) {
  return [u1, u2].sort().join("_");
}

window.openChat = (userId, name) => {
  currentChatUser = userId;
  document.getElementById("chatHeader").innerText = name;
  renderUsers(filterCurrentSearch());

  const chatId = getChatId(CURRENT_USER, userId);
  if (unsubscribe) unsubscribe();

  const q = query(
    collection(db, "messages"),
    where("chatId", "==", chatId),
    orderBy("time")
  );

  unsubscribe = onSnapshot(q, (snapshot) => {
    const box = document.getElementById("messages");
    box.innerHTML = "";

    if (snapshot.empty) {
      box.innerHTML = '<p id="emptyMessages">No messages yet. Say hello 👋</p>';
      return;
    }

    snapshot.forEach((docSnap) => {
      const data = docSnap.data();
      const div = document.createElement("div");
      div.className = "msg " + (data.sender === CURRENT_USER ? "sent" : "received");
      div.innerText = data.text;
      box.appendChild(div);
    });

    box.scrollTop = box.scrollHeight;
  });
};

function filterCurrentSearch() {
  const term = userSearch.value.trim().toLowerCase();
  if (!term) return users;
  return users.filter((u) => u.name.toLowerCase().includes(term));
}

window.sendMessage = async () => {
  const msgInput = document.getElementById("msgInput");
  const text = msgInput.value.trim();
  if (!text || !currentChatUser || !CURRENT_USER) return;

  const chatId = getChatId(CURRENT_USER, currentChatUser);
  await addDoc(collection(db, "messages"), {
    chatId,
    sender: CURRENT_USER,
    text,
    time: Date.now()
  });

  msgInput.value = "";
};
</script>

</body>
</html>
