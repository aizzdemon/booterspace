<body class="bg-slate-100 text-slate-900 min-h-screen page-govt">

  <script src="public/js/navbar-loader.js"></script>
<script>window.loadBooterNavbar && window.loadBooterNavbar();</script>

  <main class="max-w-5xl mx-auto px-4 py-6">
    <div class="mb-6">
      <h1 class="text-3xl md:text-4xl font-black text-slate-800">Latest Government Jobs</h1>
      <div class="mt-3 flex flex-col sm:flex-row gap-2 sm:items-center">
        <label for="stateFilter" class="text-sm font-semibold text-slate-700">Search jobs by state</label>
        <select id="stateFilter" class="bg-white border border-slate-300 rounded-lg px-3 py-2 text-sm text-slate-700 focus:outline-none focus:ring-2 focus:ring-indigo-500">

          <option value="Andhra Pradesh">Andhra Pradesh</option>

          <option value="Goa">Goa</option>
          <option value="Gujarat">Gujarat</option>
          <option value="Haryana">Haryana</option>
          <option value="Himachal Pradesh">Himachal Pradesh</option>
          <option value="Jharkhand">Jharkhand</option>
          <option value="Karnataka">Karnataka</option>
          <option value="Kerala">Kerala</option>
          <option value="Madhya Pradesh">Madhya Pradesh</option>
          <option value="Maharashtra">Maharashtra</option>
          <option value="Manipur">Manipur</option>
          <option value="Meghalaya">Meghalaya</option>
          <option value="Mizoram">Mizoram</option>
          <option value="Nagaland">Nagaland</option>
          <option value="Odisha">Odisha</option>
          <option value="Punjab">Punjab</option>
          <option value="Rajasthan">Rajasthan</option>
          <option value="Sikkim">Sikkim</option>
          <option value="Tamil Nadu">Tamil Nadu</option>
          <option value="Telangana">Telangana</option>
          <option value="Tripura">Tripura</option>
          <option value="Uttar Pradesh">Uttar Pradesh</option>
          <option value="Uttarakhand">Uttarakhand</option>
          <option value="West Bengal">West Bengal</option>
          <option value="Andaman and Nicobar Islands">Andaman and Nicobar Islands</option>
          <option value="Chandigarh">Chandigarh</option>
          <option value="Dadra and Nagar Haveli and Daman and Diu">Dadra and Nagar Haveli and Daman and Diu</option>
          <option value="Delhi">Delhi</option>
          <option value="Jammu and Kashmir">Jammu and Kashmir</option>
          <option value="Ladakh">Ladakh</option>
          <option value="Lakshadweep">Lakshadweep</option>
          <option value="Puducherry">Puducherry</option>
        </select>
        <button id="searchStateBtn" type="button" class="inline-flex items-center justify-center px-4 py-2 rounded-lg bg-indigo-600 text-white text-sm font-bold hover:bg-indigo-700 transition">Search Jobs</button>
      </div>
    </div>

    <div id="govtJobsList" class="grid gap-3">
      <div class="bg-white border border-slate-200 rounded-2xl p-6 text-slate-400 text-sm">Loading government jobs...</div>
    </div>
  </main>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
    import { getFirestore, collection, query, orderBy, where, getDocs, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

    function getEnvVar(...keys) {
  const runtimeEnv = (typeof window !== "undefined" && window.__ENV__) || (typeof self !== "undefined" && self.__ENV__) || {};
  const processEnv = typeof process !== "undefined" && process.env ? process.env : {};

  for (const key of keys) {
    if (runtimeEnv[key]) return runtimeEnv[key];
    if (processEnv[key]) return processEnv[key];
  }

  return "";
}

const firebaseConfig = {
      apiKey: getEnvVar("VITE_FIREBASE_API_KEY", "NEXT_PUBLIC_FIREBASE_API_KEY", "REACT_APP_FIREBASE_API_KEY"),
      authDomain: getEnvVar("VITE_FIREBASE_AUTH_DOMAIN", "NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN", "REACT_APP_FIREBASE_AUTH_DOMAIN"),
      projectId: getEnvVar("VITE_FIREBASE_PROJECT_ID", "NEXT_PUBLIC_FIREBASE_PROJECT_ID", "REACT_APP_FIREBASE_PROJECT_ID"),
      storageBucket: getEnvVar("VITE_FIREBASE_STORAGE_BUCKET", "NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET", "REACT_APP_FIREBASE_STORAGE_BUCKET"),
      messagingSenderId: getEnvVar("VITE_FIREBASE_MESSAGING_SENDER_ID", "NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID", "REACT_APP_FIREBASE_MESSAGING_SENDER_ID"),
      appId: getEnvVar("VITE_FIREBASE_APP_ID", "NEXT_PUBLIC_FIREBASE_APP_ID", "REACT_APP_FIREBASE_APP_ID")
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const govtJobsList = document.getElementById("govtJobsList");
    const stateFilter = document.getElementById("stateFilter");
    const searchStateBtn = document.getElementById("searchStateBtn");
    let allJobs = [];

    function escapeHtml(value) {
      return String(value ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function humanizeKey(key) {
      return key
        .replace(/([a-z])([A-Z])/g, "$1 $2")
        .replace(/[_-]+/g, " ")
        .replace(/\s+/g, " ")
        .trim()
        .replace(/\b\w/g, c => c.toUpperCase());
    }

    function formatValue(value, key) {
      if (value === null || value === undefined || value === "") return "N/A";
      if (typeof value === "string" && /(date|deadline)/i.test(key)) return formatDate(value);
      if (Array.isArray(value)) return value.length ? value.join(", ") : "N/A";
      if (typeof value === "object") return JSON.stringify(value, null, 2);
      return String(value);
    }

    function formatDate(value) {
      if (!value) return "N/A";
      if (/^\d{4}-\d{2}-\d{2}$/.test(value)) {
        const d = new Date(value + "T00:00:00");
        return d.toLocaleDateString();
      }
      return value;
    }

    const govtJobsQuery = query(collection(db, "govtJobs"), orderBy("createdAt", "desc"));

    function renderJobs(jobs) {
      if (!jobs.length) {
        govtJobsList.innerHTML = '<div class="bg-white border border-slate-200 rounded-2xl p-6 text-slate-500 text-sm">No government jobs posted yet.</div>';
        return;
      }

      govtJobsList.innerHTML = "";

      jobs.forEach((job, index) => {
        const postTitle = job.postName || job.jobTitle || "Untitled Job";
        const organizationName = job.organizationName || job.organisationName || "N/A";
        const jobId = String(job.id || index);

        const card = document.createElement("article");
        card.className = "bg-white border border-slate-200 rounded-xl p-4 shadow-sm";
        card.innerHTML = `
          <div class="flex flex-col sm:flex-row sm:items-start sm:justify-between gap-2 mb-3">
            <div>
              <h2 class="text-lg font-black text-slate-800 leading-tight">${escapeHtml(postTitle)}</h2>
              <p class="text-[11px] font-bold uppercase tracking-wide text-slate-400 mt-1">Organisation</p>
              <p class="text-sm font-semibold text-slate-700 truncate max-w-full">${escapeHtml(organizationName)}</p>
            </div>
            <button type="button" class="view-details-btn inline-flex items-center justify-center px-3 py-1.5 rounded-lg border border-indigo-200 text-indigo-700 text-xs font-bold hover:bg-indigo-50 transition whitespace-nowrap" data-job-id="${escapeHtml(jobId)}">
              See Details
            </button>
          </div>

          <div class="grid sm:grid-cols-2 lg:grid-cols-3 gap-2 text-sm">
            <div class="bg-slate-50 border border-slate-200 rounded-lg px-2.5 py-2">
              <p class="text-[10px] font-black uppercase tracking-wide text-slate-400">Publish Date</p>
              <p class="font-semibold text-slate-700 leading-tight mt-0.5">${escapeHtml(formatDate(job.publishDate))}</p>
            </div>
            <div class="bg-slate-50 border border-slate-200 rounded-lg px-2.5 py-2">
              <p class="text-[10px] font-black uppercase tracking-wide text-slate-400">Last Date</p>
              <p class="font-semibold text-slate-700 leading-tight mt-0.5">${escapeHtml(formatDate(job.lastDateApply))}</p>
            </div>
            <div class="bg-slate-50 border border-slate-200 rounded-lg px-2.5 py-2 sm:col-span-2 lg:col-span-1">
              <p class="text-[10px] font-black uppercase tracking-wide text-slate-400">State</p>
              <p class="font-semibold text-slate-700 leading-tight mt-0.5">${escapeHtml(formatValue(job.state, "state"))}</p>
            </div>
          </div>
        `;

        govtJobsList.appendChild(card);

        const viewDetailsButton = card.querySelector(".view-details-btn");
        if (viewDetailsButton) {
          viewDetailsButton.addEventListener("click", () => {
            sessionStorage.setItem("selectedGovtJob", JSON.stringify(job));
            window.location.href = `govt-job-details.html?id=${encodeURIComponent(jobId)}`;
          });
        }
      });
    }

    async function fetchJobsByState() {
      const selectedState = stateFilter.value.trim();
      if (!selectedState) {
        renderJobs(allJobs);
        return;
      }

      govtJobsList.innerHTML = '<div class="bg-white border border-slate-200 rounded-2xl p-6 text-slate-400 text-sm">Searching jobs...</div>';

      try {
        const stateJobsQuery = query(
          collection(db, "govtJobs"),
          where("state", "==", selectedState)
        );

        const stateSnapshot = await getDocs(stateJobsQuery);
        const filteredJobs = stateSnapshot.docs.map(docSnap => ({ id: docSnap.id, ...docSnap.data() }));

        if (!filteredJobs.length) {
          govtJobsList.innerHTML = `<div class="bg-white border border-slate-200 rounded-2xl p-6 text-slate-500 text-sm">No government jobs found for <span class="font-bold">${selectedState}</span>.</div>`;
          return;
        }

        renderJobs(filteredJobs);
      } catch (err) {
        govtJobsList.innerHTML = `<div class="bg-white border border-red-200 rounded-2xl p-6 text-red-600 text-sm">Failed to search jobs by state: ${err.message}</div>`;
      }
    }

    searchStateBtn.addEventListener("click", fetchJobsByState);

    onSnapshot(govtJobsQuery, snapshot => {
      if (snapshot.empty) {
        allJobs = [];
        renderJobs(allJobs);
        return;
      }

      allJobs = [];
      snapshot.forEach(docSnap => {
        allJobs.push({ id: docSnap.id, ...docSnap.data() });
      });

      if (!stateFilter.value) {
        renderJobs(allJobs);
      }
    }, err => {
      govtJobsList.innerHTML = `<div class="bg-white border border-red-200 rounded-2xl p-6 text-red-600 text-sm">Failed to load jobs: ${err.message}</div>`;
    });
  </script>
</body>
