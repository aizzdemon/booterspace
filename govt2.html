<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#2563eb">
  <link rel="stylesheet" href="assets/css/shared.css">
  <title>Government Jobs | State Emblems</title>
  <meta name="description" content="Explore government job updates, recruitment notices, and exam opportunities with BooterSpace.">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    /* Continuous Scrolling Animation */
    @keyframes scroll {
      0% { transform: translateX(0); }
      100% { transform: translateX(-50%); }
    }
    .emblem-slider {
      display: flex;
      width: fit-content;
      animation: scroll 40s linear infinite;
    }
    .emblem-container:hover .emblem-slider {
      animation-play-state: paused;
    }
    .emblem-item {
      flex: 0 0 auto;
      width: 80px;
      margin: 0 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    .emblem-item img {
      height: 50px;
      width: 50px;
      object-fit: contain;
      filter: grayscale(20%) contrast(110%);
      transition: transform 0.3s ease;
    }
    .emblem-item:hover img {
      transform: scale(1.1);
      filter: grayscale(0%);
    }
    .emblem-item span {
      font-size: 10px;
      font-weight: 700;
      color: #64748b;
      margin-top: 6px;
      text-align: center;
      white-space: nowrap;
    }
  </style>
</head>
<body class="bg-slate-100 text-slate-900 min-h-screen page-govt">
  <div id="navbar"></div>
  <script>
    fetch("navbar.html").then(r => r.text()).then(html => {
      document.getElementById("navbar").innerHTML = html;
      const s = document.createElement("script");
      s.type = "module";
      s.src = "public/js/navbar.js";
      document.body.appendChild(s);
    });
  </script>

  <!-- State Emblems Sliding Marquee -->
  <div class="bg-white border-b border-slate-200 overflow-hidden py-4 emblem-container">
    <div class="emblem-slider" id="emblemTrack">
      <!-- Data will be populated by JS -->
    </div>
  </div>

  <main class="max-w-5xl mx-auto px-4 py-8">
    <div class="mb-8">
      <h1 class="text-3xl md:text-4xl font-black text-slate-800">Latest Government Jobs</h1>
      <div class="mt-4 flex flex-col sm:flex-row gap-3 sm:items-center">
        <label for="stateFilter" class="text-sm font-semibold text-slate-700">Search jobs by state</label>
        <select id="stateFilter" class="bg-white border border-slate-300 rounded-lg px-3 py-2 text-sm text-slate-700 focus:outline-none focus:ring-2 focus:ring-indigo-500">
          <option value="">All States</option>
          <option value="Andhra Pradesh">Andhra Pradesh</option>
          <option value="Arunachal Pradesh">Arunachal Pradesh</option>
          <option value="Assam">Assam</option>
          <option value="Bihar">Bihar</option>
          <option value="Chhattisgarh">Chhattisgarh</option>
          <option value="Goa">Goa</option>
          <option value="Gujarat">Gujarat</option>
          <option value="Haryana">Haryana</option>
          <option value="Himachal Pradesh">Himachal Pradesh</option>
          <option value="Jharkhand">Jharkhand</option>
          <option value="Karnataka">Karnataka</option>
          <option value="Kerala">Kerala</option>
          <option value="Madhya Pradesh">Madhya Pradesh</option>
          <option value="Maharashtra">Maharashtra</option>
          <option value="Manipur">Manipur</option>
          <option value="Meghalaya">Meghalaya</option>
          <option value="Mizoram">Mizoram</option>
          <option value="Nagaland">Nagaland</option>
          <option value="Odisha">Odisha</option>
          <option value="Punjab">Punjab</option>
          <option value="Rajasthan">Rajasthan</option>
          <option value="Sikkim">Sikkim</option>
          <option value="Tamil Nadu">Tamil Nadu</option>
          <option value="Telangana">Telangana</option>
          <option value="Tripura">Tripura</option>
          <option value="Uttar Pradesh">Uttar Pradesh</option>
          <option value="Uttarakhand">Uttarakhand</option>
          <option value="West Bengal">West Bengal</option>
          <option value="Delhi">Delhi</option>
        </select>
        <button id="searchStateBtn" type="button" class="inline-flex items-center justify-center px-4 py-2 rounded-lg bg-indigo-600 text-white text-sm font-bold hover:bg-indigo-700 transition">Search Jobs</button>
      </div>
    </div>

    <div id="govtJobsList" class="grid gap-4">
      <div class="bg-white border border-slate-200 rounded-2xl p-6 text-slate-400 text-sm">Loading government jobs...</div>
    </div>
  </main>

  <script type="module">
    // --- State Emblems Logic ---
    const states = [
      { name: "Andhra Pradesh", img: "https://upload.wikimedia.org/wikipedia/commons/3/37/Emblem_of_Andhra_Pradesh.svg" },
      { name: "Bihar", img: "https://upload.wikimedia.org/wikipedia/commons/e/e9/Emblem_of_Bihar.svg" },
      { name: "Chhattisgarh", img: "https://upload.wikimedia.org/wikipedia/commons/5/5b/Emblem_of_Chhattisgarh.svg" },
      { name: "Gujarat", img: "https://upload.wikimedia.org/wikipedia/commons/a/a0/Emblem_of_Gujarat.svg" },
      { name: "Haryana", img: "https://upload.wikimedia.org/wikipedia/commons/6/6d/Emblem_of_Haryana.svg" },
      { name: "Jharkhand", img: "https://upload.wikimedia.org/wikipedia/commons/c/c9/Emblem_of_Jharkhand.svg" },
      { name: "Karnataka", img: "https://upload.wikimedia.org/wikipedia/commons/b/bb/Emblem_of_Karnataka.svg" },
      { name: "Kerala", img: "https://upload.wikimedia.org/wikipedia/commons/5/5f/Emblem_of_Kerala.svg" },
      { name: "Madhya Pradesh", img: "https://upload.wikimedia.org/wikipedia/commons/1/1b/Emblem_of_Madhya_Pradesh.svg" },
      { name: "Maharashtra", img: "https://upload.wikimedia.org/wikipedia/commons/8/87/Emblem_of_Maharashtra.svg" },
      { name: "Odisha", img: "https://upload.wikimedia.org/wikipedia/commons/3/3b/Emblem_of_Odisha.svg" },
      { name: "Punjab", img: "https://upload.wikimedia.org/wikipedia/commons/5/5d/Emblem_of_Punjab.svg" },
      { name: "Rajasthan", img: "https://upload.wikimedia.org/wikipedia/commons/1/11/Emblem_of_Rajasthan.svg" },
      { name: "Tamil Nadu", img: "https://upload.wikimedia.org/wikipedia/commons/8/81/Emblem_of_Tamil_Nadu.svg" },
      { name: "Telangana", img: "https://upload.wikimedia.org/wikipedia/commons/e/e0/Emblem_of_Telangana.svg" },
      { name: "Uttar Pradesh", img: "https://upload.wikimedia.org/wikipedia/commons/b/be/Emblem_of_Uttar_Pradesh.svg" },
      { name: "West Bengal", img: "https://upload.wikimedia.org/wikipedia/commons/d/df/Emblem_of_West_Bengal.svg" },
      { name: "Delhi", img: "https://upload.wikimedia.org/wikipedia/commons/e/ee/Emblem_of_Delhi.svg" }
    ];

    const track = document.getElementById('emblemTrack');
    // Double the array for seamless infinite looping
    const displayList = [...states, ...states];
    
    displayList.forEach(state => {
      const item = document.createElement('div');
      item.className = 'emblem-item';
      item.innerHTML = `
        <img src="${state.img}" alt="${state.name}" loading="lazy">
        <span>${state.name}</span>
      `;
      track.appendChild(item);
    });

    // --- Original Firebase Logic ---
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
    import { getFirestore, collection, query, orderBy, where, getDocs, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBeGZBE1u1-y1hDWbRouchgwkgp89D973I",
      authDomain: "kar-kardan.firebaseapp.com",
      projectId: "kar-kardan",
      storageBucket: "kar-kardan.firebasestorage.app",
      messagingSenderId: "554147696994",
      appId: "1:554147696994:web:221dcb883e3b65dcea5c3b"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const govtJobsList = document.getElementById("govtJobsList");
    const stateFilter = document.getElementById("stateFilter");
    const searchStateBtn = document.getElementById("searchStateBtn");
    let allJobs = [];

    function escapeHtml(value) {
      return String(value ?? "").replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#39;");
    }

    function formatDate(value) {
      if (!value) return "N/A";
      if (/^\d{4}-\d{2}-\d{2}$/.test(value)) {
        const d = new Date(value + "T00:00:00");
        return d.toLocaleDateString();
      }
      return value;
    }

    const govtJobsQuery = query(collection(db, "govtJobs"), orderBy("createdAt", "desc"));

    function renderJobs(jobs) {
      if (!jobs.length) {
        govtJobsList.innerHTML = '<div class="bg-white border border-slate-200 rounded-2xl p-6 text-slate-500 text-sm">No government jobs posted yet.</div>';
        return;
      }
      govtJobsList.innerHTML = "";
      jobs.forEach((job, index) => {
        const postTitle = job.postName || job.jobTitle || "Untitled Job";
        const organizationName = job.organizationName || job.organisationName || "N/A";
        const jobId = String(job.id || index);
        const card = document.createElement("article");
        card.className = "bg-white border border-slate-200 rounded-2xl p-5 shadow-sm";
        card.innerHTML = `
          <div class="flex flex-col md:flex-row md:items-start md:justify-between gap-4 mb-4">
            <div>
              <h2 class="text-xl font-black text-slate-800">${escapeHtml(postTitle)}</h2>
              <p class="text-xs font-bold uppercase tracking-wide text-slate-400 mt-1">Organisation Name</p>
            </div>
          </div>
          <div class="grid sm:grid-cols-2 gap-3 text-sm mb-4">
            <div class="bg-slate-50 border border-slate-200 rounded-lg p-3">
              <p class="text-[10px] font-black uppercase tracking-wide text-slate-400">Publish Date</p>
              <p class="font-semibold text-slate-700 mt-1">${escapeHtml(formatDate(job.publishDate))}</p>
            </div>
            <div class="bg-slate-50 border border-slate-200 rounded-lg p-3">
              <p class="text-[10px] font-black uppercase tracking-wide text-slate-400">Organisation Name</p>
              <p class="font-semibold text-slate-700 mt-1">${escapeHtml(organizationName)}</p>
            </div>
            <div class="bg-slate-50 border border-slate-200 rounded-lg p-3 sm:col-span-2">
              <p class="text-[10px] font-black uppercase tracking-wide text-slate-400">Last Date of Apply</p>
              <p class="font-semibold text-slate-700 mt-1">${escapeHtml(formatDate(job.lastDateApply))}</p>
            </div>
          </div>
          <div class="mb-1">
            <button type="button" class="view-details-btn inline-flex items-center justify-center px-4 py-2 rounded-lg border border-indigo-200 text-indigo-700 text-sm font-bold hover:bg-indigo-50 transition" data-job-id="${escapeHtml(jobId)}">
              See Details
            </button>
          </div>
        `;
        govtJobsList.appendChild(card);
        card.querySelector(".view-details-btn").addEventListener("click", () => {
          sessionStorage.setItem("selectedGovtJob", JSON.stringify(job));
          window.location.href = `govt-job-details.html?id=${encodeURIComponent(jobId)}`;
        });
      });
    }

    async function fetchJobsByState() {
      const selectedState = stateFilter.value.trim();
      if (!selectedState) { renderJobs(allJobs); return; }
      govtJobsList.innerHTML = '<div class="bg-white border border-slate-200 rounded-2xl p-6 text-slate-400 text-sm">Searching jobs...</div>';
      try {
        const stateJobsQuery = query(collection(db, "govtJobs"), where("state", "==", selectedState));
        const stateSnapshot = await getDocs(stateJobsQuery);
        const filteredJobs = stateSnapshot.docs.map(docSnap => ({ id: docSnap.id, ...docSnap.data() }));
        if (!filteredJobs.length) {
          govtJobsList.innerHTML = `<div class="bg-white border border-slate-200 rounded-2xl p-6 text-slate-500 text-sm">No jobs found for <span class="font-bold">${selectedState}</span>.</div>`;
          return;
        }
        renderJobs(filteredJobs);
      } catch (err) {
        govtJobsList.innerHTML = `<div class="bg-white border border-red-200 rounded-2xl p-6 text-red-600 text-sm">Error: ${err.message}</div>`;
      }
    }

    searchStateBtn.addEventListener("click", fetchJobsByState);
    onSnapshot(govtJobsQuery, snapshot => {
      allJobs = snapshot.docs.map(docSnap => ({ id: docSnap.id, ...docSnap.data() }));
      if (!stateFilter.value) renderJobs(allJobs);
    }, err => {
      govtJobsList.innerHTML = `<div class="bg-white border border-red-200 rounded-2xl p-6 text-red-600 text-sm">Error: ${err.message}</div>`;
    });
  </script>
</body>
</html>
